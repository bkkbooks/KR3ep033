front:
  text: 序細閱魯珍沈先生醫案用藥大抵豁痰清火之方十有六七不知者妄議為偏於清火殊不知先生盛名幾十載其全活定以萬計記載醫案亦豈僅此一卷宜溫其涼宜攻其補輒中肯綮者未易勝數予生也晚無由窺其全豹此恨事也且就此一卷而論其所施清火豁痰之品俱出人意外高人一等庸醫之共見為虛寒者彼獨確見為痰為火為鬱結援引內經及丹溪東垣諸說指證明晰窮詰原委且為主病兼病之分治標治本之論次第不紊詳略昭然真若飲上池之水而洞見臟腑者豈同俗醫之約略彷彿見外症而不審虛實舉一節以概其餘或執一己之私或矯同道之說或巢襲成方而不思貫通或攻為奇異以示聰明以他人之性命試我技術之短長者所可同日語哉若使先生果偏於清火何以於後方所載有時症而即施參橘後用六味丸收功發熱而急進參耆後用歸脾湯調治乃知虛弱之症宜補而補仍能補人之所不能補者也偏於清火之說可不辨自明矣僭弁簡首以為閱此書者解其惑庚午十月澧江閭邱松山氏記
