body:
  text: 正文汪周拔二令郎年二十二歲新婚之後乃祖督課頗嚴館於別業經年不入幃房肝火抑鬱而不舒擾其精房而成夢遺馬元儀以補腎澀精之藥治之甚至厥逆不醒謂其為虛欲脫竟以參耆鹿茸河車等藥補之日甚一日肌肉消瘦臥床不起已經一載於是延余診視時八月下旬見其飲食少進噯氣而大便燥結五六日一解語言默默小便黃赤診其脈息沉細帶數察其形唇口面色皆紅肌肉雖瘦潤澤而不枯夜間坐而下臥無倦怠之意日間只食薄粥二盞按其胸腹板硬不和軟此因補藥太過壅塞腸胃氣道不行不能宣通正所謂大羸有實也因投以二陳加萊菔子山梔枳殼香附厚朴沖元明粉服之三劑後大便去結糞三五塊胸次稍寬語言稍出又進滾痰丸三錢又去結糞五六塊再服前煎方五六帖大便去黏膩而黑色者不計間與滾痰丸及清火理氣之藥如得通泰自是可進稀粥六七碗然亦不覺大飢又以保和丸加黃連早晚服之兩月後可進乾飯余往還兩月而門人蔡滄文居其家常為調理至冬至後步履如常居宿於內新春到舍奉謝酬以千金此康熙四十八年之事其人號麗夭至今無恙今元儀謂是渠調治而安欺妄無耳即此一案可知其無不說謊無一可信而猶謬自著述附會於他人之書尾真鬼蜮也雍正八年海上沈璠時年七十有八天老久服右歸飲其中有桂附甘草甘草甘緩不能下達腎家桂附之性留戀胃中其熱性升而不降所以兩足不暖河間云兩足冰冷者此火不下降也火降則足自暖矣熱藥之性積而不散煅煉津液成痰今交相火司天之年夏暑薰赫之勢內伏之痰火得外風所觸故胸膈不寬嘔吐痰涎汗出過多此汗系胃中濕熱痰火鬱蒸而泄即東垣所謂地之濕氣即為汗也診得脈息左手沉弦帶數此肝火不靜也右手滑大關部尤甚此胃中痰飲不清也恐其大便燥結痰涎上壅而嘔吐釀成噎膈反胃之症內經云三陽結謂之膈丹溪云噎膈之症多起於血枯痰膩多升少降大忌香燥熱藥惟以豁痰清火潤澤之藥而使大便不燥結為第一著在老向有咳嗽之疾緣勞心過度外為風寒所觸內郁之火竊發上千肺家而咳嗽已經四載今交相火司天之年內外之火交相煽動咳久肺絡受傷痰中帶血脈息左手弦細帶數右手虛大滯滑此係腎水不足不能榮養肝木肝火升騰爍金難經云東方實西方虛瀉南方補北方理宜滋陰降火納氣歸源之藥治之煎丸並進並宜寂靜調攝庶不致喉爛聲啞釀成勞瘵也可老數年前曾患血症服寒涼之藥得以相安去年血症復發他醫誤進熱藥以致火來乘金而咳嗽究其受病之源腎水不足不能榮養肝木木火升騰血隨火沸而出今歲少陽相火司天內外之火交相煽動致頻咳而咽喉痛肺與大腸相為表裡火流於肛門而發毒目前脈息弦細帶數此腎水虧損相火上炎肺金受困之症反以桂附炮姜等燥之劑耗其腎水爍其肺金意欲求愈難之至也今且用滋陰降火保肺之藥並應寂靜調攝不使咽喉作楚庶有佳兆生地麥冬地骨皮川貝苡仁鮮百合牛膝知母黃柏栝蔞霜加茅根煎因酒傷胃胃中之血凝滯不散隨氣上升而吐黏膩紫色之血此瘀血也理應理氣消瘀之藥治之使氣順而不上升則血自下行而不至上逆矣誤用滋陰之藥遂致胃中之痰瘀不清隨致上千肺家而咳嗽胸膈不舒脈息弦滑此係胃中之痰瘀不清肝家有火之故也暫用理氣消瘀清熱和胃之藥為治俟胸膈舒暢然後以滋陰之藥為善後之計治血症必先理氣為主氣順則血自歸經此萬古不易之法也香附山梔桃仁牛膝鬱金廣皮枳殼歸尾黃芩丹參茅根平素善飲酒性大熱有毒貯於胃中燔灼津液而發渴因將寒涼生冷之物恣意而啖致火鬱遏不得發泄流於經絡而環跳作楚入於腸胃而作血痢達於肌表而皮膚作癢乾燥內火不得疏泄擾其津液而愈渴脈息沉澀此鬱火未經發越之故也理宜和胃清熱疏理之藥為治並忌醇酒厚味生冷等物煎方白芍甘草黃連黃芩香附厚朴山梔滑石木通丸方蒼朮黃柏黃芩山梔香附廣皮枳殼石羔白蒺藜木通煎湯法丸季老受病之源得之君火司天之歲夏令炎熱之時感冒暑熱之邪以致大便泄瀉即內經所謂暴注下迫皆屬於火也熱邪上衝心生血肝藏血肝為相火兩火相煽則血隨火沸而上逆肝為將軍之官其性暴主疏泄其氣鬱而不舒逆於腹中則腹不寧不時噯氣準繩云噯氣火土之氣鬱而不舒也氣道不舒故蹇於語言也肝火不得疏泄上升則頭眩下降則腹作鳴胃主肌肉犯胃則肌肉跳動擾其精房則夢遺泄滑心藏神肝藏魂二火相煽則神不寧而臥不安也陽事者宗筋之會肝之所循火亢於上故常舉而不痿也得以小便而痿者肝火從溺而泄也蓋下有二竅有水道有精道精道閉則水道開水道閉則精道開脈息沉而帶數有力種種諸症皆系肝氣鬱而不舒肝火不得疏泄之故也理宜清肝火疏肝氣利水道之藥治之自愈但時值冬令閉藏之月木火內伏不能條達至春氣發生木得疏泄自然卻去病蒂矣龍膽草黃柏連翹山梔夏枯草木通青皮香附枳殼賓老平昔嗜酒酒性濕熱積於胃中薰灼於口而舌為之糜碎下注膀胱而小便為之渾濁綿延已久脾氣大虛飲食減少而覺無味脈息短小此脾虛而濕熱未清也理宜健脾氣清濕熱加味六君子為治白朮人參甘草熟半夏廣皮茯苓黃連石羔藿香白葛根陰虛火炎而吐血上爍肺金腠理不密外邪乘虛襲肺而咳嗽入於大腸腹中作痛下利見血脈息洪大此火得風而熾也理宜疏風理氣之藥為治俟咳嗽稍平然後以滋陰降火之藥培其本蘇子杏仁枳殼廣皮前胡薄荷白芍甘草黃芩香附加生薑蘇州吳佐臣案經云陽絡傷則血外溢因勞力過度有傷胃絡血瘀胃中則肝火上升而吐所來之血厚而黏膩此瘀血也理宜消瘀降火順氣之藥治之又因補之太早余瘀未盡所以今春復吐既吐之後陰血有虧肝火上爍肺金而咳脈息弦細帶數此腎水虧損肝火妄動肺金受困之象也理宜滋陰降火保肺之藥為治生地丹皮麥冬川貝白芍北沙參栝蔞霜黃柏知母地骨皮加蓮子南匯東門外周振育經云九竅不通腸胃之所生也胃中痰積壅滯不得通泰所以鼻為之病逐去胃中之痰積使從大便而出則鼻竅自利矣半夏廣皮枳殼香附栝蔞山梔黃芩木通萊菔子加生薑又服滾痰丸南匯東門外金時成胃中有痰外受風寒鬱而不舒上千肺家肺家閉塞而聲啞非勞病久嗽之聲啞也半夏廣皮杏仁蘇子枳殼前胡薄荷黃芩山梔鮮菖蒲根加姜嘉定王佩玉令姊肝火鬱於胃中不得條達通暢以致作脹攻衛作響注於大腸則為泄瀉脈息弦數經事不至此乃木鬱土中理宜扶脾疏肝之藥香附山梔黃芩枳殼廣皮白朮厚朴青皮白芍水煎東山夏姓胃中濕痰隨火下注精房而遺滑誤以補腎澀精之藥治之以致濕痰糾結於胃飲食少進難以運化脈息弦滑右手關部尤甚胃中有濕痰肝家有鬱火也理宜豁痰清肝之藥為治半夏廣皮枳殼栝蔞實厚朴香附山梔加姜煎魏提臺年六十九平日勞心思慮氣結痰凝於胃春三月得不寐之症每至夜間胃中如焚煩躁不寧目不交睫晝則稍安毫不倦怠飲食雖進而無味諸醫俱云心血不足用天王補心丹有議心腎不交而用加味地黃丸有議思慮傷脾而用歸脾湯愈覺日甚將有發狂之兆如此者兩月餘延余診視面色紅亮而浮脈息沉小滑而有力關部尤甚此乃肝火鬱而不舒胃中膠痰固結而不通也經云胃不和則臥不安又云陽明病不得眠大便三四日一解用礞石滾痰丸三錢大便去黏膩之痰不計二便如火以二陳石羔黃連山梔石菖蒲鉤藤栝蔞實枳殼連進四帖即能安臥然有時胃中如火又用滾痰丸三錢又去白痰碗許仍用前豁痰清火之藥丸服二十日全愈一月後又停食冒風胃脘作痛發熱用消導之藥平安後用加味六君子湯調養康健倍常分巡道朱一鳳幼孤而貧讀書作文借酒陶情濕熱蘊蓄於胃中上薰於口而糜爛愈後或每月一發或兩三發發必咽痛而口碎乾飯入胃痰涎溢出口角已經六載不能卻去病蒂雍正三年夏末秋初延余診視面色紅亮大便燥結不渴畏茶湯先以蒼朮厚朴廣皮旋覆花石羔枳殼黃柏萊菔子湯藥連進三劑頗覺相宜細思濕痰非湯液所能治即以前藥去旋覆加栝蔞實為末用淡薑湯法丸服半月覺膈舒暢大便去黏膩痰飲不計口內不流涎亦不糜爛矣俊宜徐和修平昔嗜酒則知濕熱之蘊於胃者久矣加以夏令熱邪侵襲至收斂於內交一陽和動之時內斂之邪流動發越而為痢春夏邪氣散漫流注經絡而作痛俗名痢後風也診得脈息左手弦右手弦且滑大此濕熱滯於腸胃失於推蕩以致流注經絡而支節腫痛治宜理滯氣清濕熱之藥厚朴枳殼廣皮木通滑石蒼朮黃芩黃柏秦艽加桑枝煎張壽南肝火鬱於胃中不得疏泄而寒熱如瘧胃脘或時作痛脈息洪大而弦滑此胃中有痰肝家有鬱火也宜豁痰理氣疏肝之藥為治並宜清虛淡泊則胃中清爽而痰自無矣柴胡青皮半夏廣皮山梔香附黃芩甘草枳殼加姜煎松江張殿舟天稟素弱腎水不足夏令兼暑熱之邪至秋髮瘧瘧愈而暑邪未清補劑與葷腥太早致餘邪未清流注於背脊支節之間作痛擾其胃中之血下流而為便紅至春令發生三月餘邪外達復寒熱如瘧交夏令內伏之火炎炎而熾加之酒熱助火胃中之血隨火而升脈息左手弦數此肝火妄動也右手洪大此胃中之火不靜也火來爍肺故痰中帶血肺氣布於胸膈致氣升不舒目下降氣清火火降則血降治血必先理氣氣降則血自歸經而不致上逆矣暫用理氣清火服四劑後胸次舒暢氣不上升然後以滋陰降火清金保肺之藥治其本並宜戒惱怒忌一切肥膩辛辣醇酒厚味為主生地蘇子鬱金丹參枳殼黃芩山梔棗仁蔞仁白芍川連牛膝荷葉汁茅根娘娘肝家之火鬱而不舒煅煉津液成痰隨火上升咽噎之間結成有形之象升降無時上升則頭眩耳鳴降下則兩足麻痹而熱脈息左手弦數右手帶滑且大此乃郁痰鬱火症也理宜和胃豁痰清肝之藥治之並忌醇酒厚味戒惱怒為要唐露玉令堂川連黃柏石羔半夏廣皮香附山梔桔梗甘草栝蔞夏枯草加姜煎丸方加貝母夏枯草湯法太倉錢因之令媳娘娘平昔有肝火所以善怒每每產後必作血暈此因肝火而作暈也懷娠之時肝氣鬱而不舒郁之既久則產後空虛其火上衝而作暈平時兩足冰冷此火不下降火氣上蒸於頭則發墮目下懷娠六月腰痛而帶下飲食少進而作脹脈息弦數此腎水不足不能榮養肝木鬱於脾土之中恐火氣擾其血分而有墮胎之慮理宜扶脾疏肝清火之藥治之白朮白芍條苓枳殼香附廣皮白茯苓黃柏甘草崇明襲永和痰火鬱於胃中不得通泰而作痛用通利之藥肛門覺熱小便黃赤此火氣下降也因痛而飲燒酒得以暫止者蓋熱得熱則同氣相求似乎相安而實助其為患也理宜清火和胃理氣之藥為治半夏廣皮黃芩石羔香附山梔青皮枳殼黃柏栝蔞實揚州東門外顧友仁兄飢飽不時惱怒傷肝有傷胃絡經云陽絡傷則血外溢致吐瘀血已延四載不時竊發去血過多陰分受傷肝火上爍肺金而咳嗽痰涎頗多脈息左手弦而帶數此肝火妄動也右手又見滑大此胃中有痰也先宜戒惱怒省言語調飲食避風寒暑熱靜養調攝並服滋陰降火保肺清金之藥為治生地丹皮川貝廣皮麥冬骨皮白芍栝蔞霜崑山邵政平令郎腎水不足不能榮養肝木肝火上升外受風寒胃中之痰隨火上千肺家而為咳嗽用發散之藥升提其火以致吐血咳嗽不止痰涎頗多至五月初復發脈息弦數此水衰火亢肺金受困之症理宜滋陰降火保肺之藥治之生地丹皮麥冬白芍黃柏知母貝母丹參骨皮牛膝加茅根煎東山劉永傳瘧痰之後飲食不節脾傷不能運化而成積滯胸腹脹滿按之堅實日漸以大大便或結或溏後重不爽快面色痿黃脈息左手沉弦右手滑大此肝氣鬱而不舒胃中積滯糾結不清也理宜扶脾胃疏肝氣消積滯藥白朮枳實半夏廣皮香附山梔厚朴青皮萊菔子山查濮院吳廷來胃脘作痛而嘔吐乃肝火鬱胃而成誤服熱藥幾至危殆用清火和胃之藥嘔吐已平但郁久未清有時上逆脈息弦數此胃不和而餘火未清也當以和胃清火之藥治之半夏廣皮山梔香附石羔川連栝蔞青皮枳殼加姜平湖陳晉公平素多思多郁肝火鬱於胃中不得疏泄煅煉津液成痰阻滯氣道飲食入胃則作脹而痛近因春令肝木用事惱怒傷肝以致左脅作痛以手按之亦痛肝為藏血之臟怒則傷肝而血為之郁經云大怒則菀於上令人薄厥將來慮其隨火上升而吐脈息沉弦而澀此瘀血阻滯胃中作痛也理宜行滯消瘀理氣之藥治之今先用一味大黃丸以逐胃中之血從大便而出並慮其成噎膈之症也桃仁歸尾鬱金牛膝香附山梔青皮半夏廣皮大便黑色故知其有瘀血也服酒蒸大黃丸二錢大便去結糞黑色黍膩之物不計肛門覺熱則知郁與瘀血無疑矣但胃中尚未清爽所以胸膈不能寬暢背心作痛在此肺腧也經云諸氣膹郁皆屬於肺因郁之久火氣不能通達以致作痛今診得脈息弦大帶數因服通利之藥火氣得以發泄故也調治之法先講開鬱消瘀潤大便為要結則肺脘不通而痛內經云三陽結為之膈三陽者大小腸膀胱也結於下則反之於上而噎膈之症來矣常將湯液滑潤之物滋其大便並服蔗漿梨汁蘆根汁而使大便不燥結為妙白芍甘草桃仁當歸鬱金香附山梔枳殼半夏廣皮夏枯草煎湯服黃江涇沈上林令堂娘娘受病之原得之惱怒抑鬱之於胃中煅煉津液成痰隨肝火上升於結喉皮裡膜外結成痰塊氣滯而日漸以大內經云榮氣不從逆於肉里乃生壅腫因氣滯而痰凝不散所致也脈息左手沉弦右手關部獨見沉滑肝家有鬱氣鬱火胃中有膠痰糾結理宜理氣豁痰之藥為治並忌醇酒厚味等物半夏廣皮萊菔子蔞實枳殼香附山梔黃芩夏枯草白芥子青皮丸方加海石竹瀝生薑壽南兄去冬感受寒邪背脊惡寒寒束其火不得疏泄流注於胸脅之間攻衝於胃或痛或不痛寒熱似瘧此冬令寒邪至春發越故為寒熱也誤用參耆白朮閉其腠理邪氣內伏故寒熱雖止而不清肺家則為咳嗽脈息洪大而弦此內火鬱而不舒理宜豁痰理氣疏肝之藥治之連進數劑自然全愈矣柴胡茯苓甘草枳殼半夏青皮廣皮山梔香附前胡加姜煎常州江甸方幼時有夢遺之病此肝火妄動擾其精房而來醫者俱以補腎澀精之藥澀之其火不得下降反以桂附助其火其火愈熾而上升血隨火沸而衄血今值純陽之月內火與外火交相煽動而胃中之血大吐不止胸膈不寬喉中作癢此吐後不歸經絡之血留滯膈間肝火鬱而不舒脈息左手弦數右手洪大有力此胃中余瘀未盡肝火不靜理宜消瘀清火理氣之藥治之並宜清虛淡泊一切醇酒厚味暫宜停止俟胃中氣降火降胸膈寬舒然後議調補之法為善後計桃仁歸尾香附山梔牛膝丹參白芍青皮滑石黃芩茅根一兩先服酒蒸大黃三錢青浦潘麗文兄飢飽不時外邪乘虛襲肺而咳嗽痰中帶不鮮明之血些少因不避風寒不忌葷腥誤作勞症吐血而醫治郁其血邪在內不得發越綿延至今咳嗽日甚嗽極則嘔胸膈不舒大便滑泄小便黃赤肛門發熱脈息左手弦大帶數右手滑大帶數此胃中有痰肝家有火郁之既久乘夏令火氣發越之時肺家之火流注於大腸而為滑泄並非脾虛作瀉也理宜降氣豁痰清火之藥為治俟胸膈舒暢痰火下降肛門不熱小便清白然後以滋陰之藥培其本暫忌醇酒厚味等物為要半夏廣皮蘇子杏仁香附石羔黃芩山梔甘草加生薑煎平湖王永年胃中之痰隨火升降晝則行陽二十五度隨火上升滯於胸膈而作脹按之有形飲食難以下達夜則行陰二十五度隨火降下而胸次舒適注於精房而為夢遺脈息弦滑有力此胃中之痰隨火升降而為患也理宜豁痰清火之藥治之半夏廣皮蔞實黃柏枳殼香附梔子萊菔子川連加姜煎上洋馬頭渡李云甫媳二十歲於二月十四日患脅痛氣喘不得臥數日諸醫皆以風寒發散或用降氣等藥不能取效平希於以為肺脹法在不治余適往外家經過門首邀余診視見其面青氣喘兩脅作痛不能閤眼而臥其母其姑俱備後事在患者之旁患者見之淚下診其脈兩手弦急無痰聲鼻不煽無汗出即示未為絕症後事且緩病者安心心安則能安枕此亦法也此症當春令肝木旺之時木火垂金因擬一方用白芍甘草栝蔞川貝黃連石羔廣皮鉤藤蘇子用生鐵二兩煎湯煎藥一劑後即能安臥希於至見其安臥問余用何宗湯藥此症木旺故用鉤藤生鐵助金以平肝黃連清心火石羔清肺平肝蘇子降氣貝母橘皮栝蔞降痰潤肺白芍甘草緩肝彼亦心服後皆希於調治而安浙江西新城李益書平素服八味丸歸脾湯數年後覺胸中痰火鬱結大便五六日一解頭面烘熱而紅此因桂附太多積熱於胃煅煉津液成痰脈息數大用清火疏理之藥病勢稍減然苦於大便燥結胸腹如燎此鬱火不能外達用涼膈散一兩以瀉其鬱火十月初旬用藥起至次年正月下旬腹中舒暢肛門不熱復服滋陰降火之劑而愈川沙北門外金隆吉令郎二十二歲七月初旬患時症發狂譫語氣急痰升不能安臥諸醫以黃連石羔連翹等清火之藥治之半月不愈迎余診視面色唇口皆紅身無大熱按之胸腹和軟大便滑瀉小便清利痰聲作齁脈息虛大不能安臥細究此症若陽明胃實大便必結胸腹按之必實舌必黃苔今無是證觀其小便不禁而利惟痰聲齁齁此乃少年不謹暑熱之邪傷其元氣清熱之藥已多不能見效難於下藥以人參一錢橘紅一錢煎徐徐與之以扶元氣而化痰服完平安又復煎與之一晚計服人參七錢橘紅七錢半兩日服人參橘紅四兩痰聲下降人事清爽而熟睡復用六味丸生脈散調理而愈柴場灣唐虞在令政懷娠七月正月春初倏而眩暈兩手瘛瘲不能言語不省人事面色紅亮脈息左手弦而帶數右手滑大有力此肝火熾盛上衝於胃胃中之痰擾心肺之竅而昏瞶不省人事因此而胎亦墮用二陳加黃連鉤藤山梔鮮石菖蒲膽星枳殼鬱金沖童便梨汁竹瀝薑汁連進二劑即能開口而知人事小產彼亦不知後用涼血生地丹皮鉤藤黃連廣皮丹參鬱金石菖蒲甘草加蓮子調理而安蘇州閶門外益隆號程希文伏暑未清葉天士用參朮補之以致胸腹作脹攻衝不寧不能安臥已經兩月至十月十五日延余診治小便黃赤飲食不進用二陳加厚朴青皮香附黃連滑石枳殼四劑而諸症皆退後用六味而全愈閶門外上津橋陳友文令郎正月患咽喉作痛用滋陰清火之藥咽痛已除而胸膈滿悶痰涎上壅飲食不進不得安臥已經兩月邀余診治門人杜良一同往診得脈息甚大口亦不渴唯見痰涎上壅胸中滿悶而不能進飲食此胃中有痰而不得臥用滾痰丸三錢下頑痰不計即能安寢而胸前舒適復用二陳加石菖蒲鉤藤枳殼連進四劑而愈蘇州齊門外蔣奶奶寡居七載勞心抑鬱肝氣不能條達通暢以致滯下腹痛後重胸膈不寬而噁心時當初夏葉天士以為不足之症而用人參人乳等補劑適余在吳門延余診視門人杜良一同往診得脈息弦大帶數腹痛後重肛門如火口乾氣急此肝家鬱火下注而為滯下上升而嘔惡胸膈不寬用黃芩芍藥湯加厚朴枳殼香附山梔黃連木通滑石一劑腹痛頓除飲食可進連用四劑痢止胸寬復用香附廣皮厚朴枳殼黃芩黃連而病愈上洋南關外周襄文七月初往松江完糧途中奔走百有餘里兼之飢餓發熱自汗不止倦怠乏力語言難出脈息虛大諸醫以為冒暑議用香薷飲延余診視脈息虛無力汗出如注無氣力轉動即曰此熱傷元氣飢餓勞倦所致即以黃耆五錢人參三錢白朮三錢麥冬一錢五味子七粒連進三服汗斂神復以粥食與之始得安臥後用歸脾湯生脈散而愈崇明沈尚其三消之症不一有火衰不能蒸其津液上騰小便清白而味甘者昔漢武帝患此張仲景以八味地黃丸治之今尚其正是此症服藥已稍愈惟口內乾燥小便如膏足痿乏力乃虛火上炎肺金受灼內經所謂諸痿皆屬於肺熱脈息虛大理直生脈散治水之上源八味丸補火為要煎方人參五味子麥冬玉竹黃耆金石斛生地天冬加蓮子丸方熟地山萸肉山藥澤瀉茯苓丹皮天冬麥冬肉桂附子崇明黃土端肝火鬱於小腹外為寒涼所遏不得伸越以致結成有形之象稍有所觸上千肺家而作痛攻衝不寧而嘔逆脈息左手沉弦帶數右手沉滑有力此肝家有鬱火胃中有痰飲也理宜清肝火疏肝氣和胃豁痰之藥治之半夏廣皮香附山梔黃柏桂枝青皮萊菔子加生薑煎黃士端後案氣結於小腹之右邊有形一條堅硬此係外受寒邪郁其肝火不得疏泄遇冬令潛藏之月火氣內伏稍觸寒邪則上干於胃而胸膈脹滿當以疏肝和胃清火之藥為治蘇子桂皮沉香枳殼黃柏香附山梔青皮半夏橘紅栝蔞萊菔子加姜煎崇明沈天章飢飽不時胃絡受傷血瘀於胃以致胸膈不寬而吐黍膩之血屢次竊發脈息弦數此乃胃中痰瘀糾結不清也理宜消瘀理氣豁痰之藥為治今晚先服酒蒸大黃丸二錢以逐胸中之瘀滯使其下行清晨方可以煎方服之桃仁歸尾牛膝丹參滑石半夏橘紅香附栝蔞枳殼萊菔子加生薑煎沈天章後案瘀血留滯於胃者日久服消瘀煎劑大黃丸二服其血已從大便去矣但去之猶未盡再當以消瘀之藥漸漸消之使之下行俟胸膈舒泰氣不上升即停丸藥如覺氣升而逆恐其血來即以此方服之丹參桃仁半夏廣皮香附滑石牛膝鬱金栝蔞山梔枳殼茅根丸方即以本方加萊菔子崇明袁達九去夏感受暑濕之熱邪加之飲酒太過蘊蓄於胃不能通暢以致胸膈不寬飲食不進面色帶黃小便短少而赤大便燥結脈息左手帶弦右手滑大有力此乃胃中濕熱積滯未清也當以清濕熱和胃理氣之藥治之半夏萊菔子栝蔞滑石厚朴廣皮香附山梔木通枳殼加姜煎平湖江尚安去春時症之後不忌葷腥致肺金不清咳嗽吐血延至冬令火氣潛伏之時內熱更甚上升而爍肺金咳嗽日甚胸腹如燎下注而肛門發毒大便不實目前夏令炎炎之勢不足之金奚堪燔灼脈息細數無神此乃水衰火亢肺金受困之象雖大便不實乃肺虛因熱而跗踵非脾虛之症燥脾之藥不宜多服惟以滋陰保肺清熱之藥為治生地麥冬丹皮苡仁橘紅白芍骨皮白芩川貝加蓮子十粒太倉沙頭鎮孫金祥平素善怒躁急內有肝火得外之風寒所觸上干於肺而咳嗽之極則血隨火沸而吐出脈息弦數此乃腎水不足不能榮養肝木肝火上炎而爍肺肺金受困之象理宜滋陰降火清金保肺之藥並宜戒惱怒慎起居不至釀成勞瘵也生地丹皮麥冬骨皮廣皮川貝栝蔞黃柏知母杏仁加蓮子砂仁下沙王敬哉血症之後腎水不足虛火上炎爍肺氣不能納藏於下上升而咳因腎納氣肺布氣腎虛氣不歸源故稍有動作言語則氣上升而咳嗽脈息虛大兩尺尤甚乃腎虛氣不歸源也理宜補腎納氣之丸治之熟地萸肉丹皮山藥茯苓澤瀉五味子枸杞兔絲磁石砂仁玉竹麥冬白芍蓮肉王敬哉令愛女子十四而天癸至今逾期不至者此先天之真陰不足也況有咳嗽吐血之症乃水衰火亢肺金受困之象理宜滋陰降火保肺之藥為治生地丹皮骨皮當歸黃芩白芍白苓花粉麥冬玉竹加蓮子十粒五灶蔡六老胃中痰火糾結不清干清虛之府以致不得安臥神魂不寧脈息弦滑此乃痰火充塞於胃也先以滾痰丸二錢淡薑湯下之使痰從下竅而出然後用豁痰清火之藥並忌醇酒厚味為要半夏廣皮去白枳殼石羔鉤藤黃芩栝蔞萊菔子石菖蒲根加姜竹茹新場程君爍先天腎水不足相火妄動上爍肺金外邪乘虛襲肺發為咳嗽已服過疏之劑外邪已去惟有火氣上炎而乾咳脈息弦數此乃火亢肺金受困之象理宜滋陰火清肺藥為治生地丹皮麥冬杏仁川貝蘇子栝蔞仁黃芩山梔地骨皮加蓮子服滋陰清肺之藥咳嗽稍減夜可安寢脈息不數此漸愈之佳兆也但必得煎丸並進並靜養調攝可免勞瘵之疾也煎方生地丹皮麥冬栝蔞霜玉竹地骨皮川貝苡仁知母川柏加蓮子丸方熟地天冬麥冬茯神棗仁黃柏知母丹皮骨皮川貝蜜丸白湯下北六灶楊啟林去冬患瘧三日一發此內伏之暑邪與胃中之痰積互為患也又因飲食不節鬱而為熱胃中火氣上升而鼻衄綿延至今不愈脈息弦大帶數滑此胃中痰積未清也先宜清虛淡泊臨發之日只宜以薄粥養之並服豁痰疏理清熱之藥柴胡半夏廣皮香附枳殼川樸茯苓甘草知母青皮熟石羔加姜煎金澤蔣元信食入即吐是有火也脈息洪數此肝火上衝於胃而吐也理直和胃清火之藥半夏廣皮茯苓香附山梔石羔黃柏白芍黃芩加生薑竹茹茅根嘉定西門外朱聖希先天腎水不足相火上炎銷爍肺金而咳嗽午後發熱脈息虛大帶數此水衰火亢也理宜滋陰降火保肺之藥為治並宜絕嗜欲戒惱怒靜養調攝不至釀成勞瘵也生地丹皮麥冬骨皮黃柏白芍川貝沙參白茯苓枸杞玉竹加蓮子平湖張御仁飲食過飽停滯胃中糾結成疾胸膈脹滿按之堅實有形面色帶黃脈息沉滑帶弦此胃中濕熱所積糾結不清也恐其成黃疸鼓脹之疾理宜清濕熱豁痰之藥治之蒼朮川樸半夏橘紅枳殼山梔滑石青皮香附萊菔子黃芩加生薑先用一味熟大黃丸二錢砂仁湯下後服煎方黃維思令侄胃絡受傷經云陽絡傷則血外溢大便去黑血如痢脅肋與小腹作痛此瘀血下行而為惡痢者吉兆也理宜清瘀降氣之藥逐其瘀血下行以當歸補血湯固其外衛不使元氣散失桃仁歸尾牛膝鬱金青皮香附白芍山梔棗仁加茅根再用綿耆一兩當歸二錢不時煎飲頻頻服之以代茶同上後案血證之後陰分已虧虛火灼肺而咳面色萎黃大便不實脾肺之氣虛也脈息虛大帶數此真陰虧損肺金受困之象大凡咳嗽之病當以生脈散地黃丸治之趙養葵所謂咳嗽不治肺而治腎腎氣納藏於下不上升則不咳矣暫以補腎納氣之藥治之六味加麥冬五味棗仁砂仁煎方同上後案準繩云諸血症皆以胃藥收功此一定之理咳嗽內熱皆肺氣虛而不能固其外衛外衛不固而汗出風邪乘虛襲之而咳嗽愈作矣藥不可以寒涼傷其胃氣使大便不實而飲食少進則難於調治矣當以扶脾保肺之藥治之綿黃耆茯苓苡仁山藥棗仁廣皮五味子麥冬砂仁建蓮肉為末荷葉湯法丸人參湯下新場閔若洲家一僕婦為乳母年滿歸適中秋往候因食梨藕生冷之物一時喉間鎖定不能出聲不知痛癢手足冰冷面色白而帶青脈息沉伏湯藥不進束手無策余將紫金錠薑湯磨灌漸漸喉門氣降有聲寬舒開口後用二陳加理氣之藥而安亦因鬱怒而食生冷之物也又治裁衣費姓之女年已二十外未嫁忽然倒僕手足冰冷面色青無痰聲不開口脈息伏亦用紫金丹開口進藥而愈如此症者甚多凡遇不開口無痛楚忽然而起者先以開通關隘為第一著語言得出可以得生若認為虛妄投人參者無有不死戒之慎之評張景岳咽喉條內新場徐興若大病之後脾肺之氣已虛所以大便作瀉而肛門下墜四肢倦怠乏力脈息數軟此氣虛下陷之故理宜加味補中益氣湯治之人參白朮黃耆當歸柴胡升麻甘草茯苓五味廣皮木香煨加天冬荷葉蒂砂仁余治胡政之痢其年七十二歲先胸膈不寬飲食不進者兩月餘自以為膈症與諸老友訣別往太倉調理至八月初患痢血積稠黏裡急後重肛門如火諸醫以為老年氣血衰耗以培脾胃為主其痢更甚且煩躁內熱飲食絕然不進而兼噁心延予診治脈息滑大肛門如火小便不利後重逼迫余用大黃檳榔枳殼黃芩厚朴為丸服之大下紅積不計胸腹稍舒熱勢更甚用井水調益元散連進三碗其肛門之火熱如焚因涼水清其火而下降仍用西瓜水不時呷之服藥以苓芍枳殼滑石木通厚朴檳榔金銀花連進十五劑月餘病勢平安胸膈通泰飲食大進而愈壽至八十六若此時以溫補培其本必然至死然清火而不用黃連者恐厚腸胃而大便愈難也原評用藥之不苟如此檳榔性如鐵石裡急後重之聖藥評張景岳痢疾條內華玉英令郎琴五患痢大便瀉血水一日夜五六十次裡急後重肛門如火小便不利諸醫用和血調氣利水之藥不能取效余診視脈大而數唇口俱紅余曰如此暴注下迫皆屬於火津液枯耗焉得小便惟以水能制之用井水調益元散並以西瓜不時與之小便即來用芍藥湯加芩連枳殼之類半月平安計飲冷水益元散十三碗西瓜四十餘枚而愈評景岳痢疾條新場朱次章患瘧痢積滯紫紅黑色腹痛後重口渴喜飲食物不進投大黃清火之藥連下數次並以西瓜益元散不計得以熱退身涼兩月而愈參朮補氣之類俱不用以涼血滋陰而收功新場葉硯孫春時患膈症飲食不進用清火豁痰之藥並蔗汁蘆根汁飲之至八月初間下痢紅積裡急後重用檳榔丸通之又用芍藥黃芩黃連滑石當歸枳殼等藥而痢止胸膈亦寬飲食漸進後以滋陰之藥煎膏調理而全愈評景岳痢疾條內蘆店周西扶因惱怒抑鬱動其肝火上干胃家痰隨火升閉其心竅以致舌音不清語言蹇澀口流痰涎脈息左手弦數右手滑大此肝家有鬱火胃中有痰飲乃類中之基也理宜豁痰清肝之藥治之並戒惱怒忌醇酒厚味等物面色亦紅甚半夏橘紅天麻石羔連翹川連栝蔞枳殼茯苓香附石菖蒲鉤藤吳江八拆鎮錢士能因感暑熱之邪而血痢愈後不忌葷酒以致未盡之暑邪留於腸胃而發瘧疾瘧愈其暑熱之邪流於經絡而作楚小便黃赤腹中嘗不舒暢似乎有形脈息沉弦帶滑此暑熱之邪未盡之故也理宜清暑熱之藥為治半夏廣皮枳殼厚朴柴胡黃芩木通滑石香附生薑後案伏邪已經三載雖用疏通清火之藥其濁氣攻衝為患脈息帶弦猶恐飲食不節復感暑邪而為瘧也理宜疏理清熱之藥治之先用滾痰丸二錢淡薑湯下產後四日胸膈不寬小腹作痛此皆瘀血氣滯之故先宜薄粥將養然後服消瘀理滯之藥香附青皮桃仁山查延胡索廣皮益母草丹參赤芍枳殼砂仁千墩唐魯玉令堂後案據述服煎藥十二劑兩足熱痛已除噎間之塊亦去此藥已對病漸愈之佳兆也今擬一方將前方服完二十劑即以此方接服交至秋冬再商治法半夏廣皮萊菔子栝蔞土貝黃柏山梔香附桔梗石羔夏枯草加生薑唐魯玉令堂後案據述服煎方二十劑咽噎之塊已消胸膈之間飲食即痛此因惱怒氣滯痰聚胸膈而作痛也先以滾痰丸二錢淡薑湯下以逐胃中之痰使其下行則胸膈寬而飲食不痛矣半夏栝蔞香附枳殼山梔廣皮萊菔子石羔黃芩加姜煎七分溫服丸方即以此方加天麻柏土貝用夏枯草湯法木通湯送下塘西顧剛宗弟婦病起於產後感冒風寒胃中之痰火上干於肺而為咳嗽薰灼於上而口發疳瘡綿延一載至春肝火上升痰涎多而口乾燥咳極則嘔脈息弦數帶滑此胃中有痰火得外邪觸動為咳嗽久則成蓐勞之症暫用豁痰降氣之藥繼以滋陰保肺之劑治之半夏廣皮茯苓蘇子杏仁枳殼桑皮黃芩石羔地骨皮加姜煎洞庭東山陳康源去冬感受寒邪胃中之痰火為寒邪所郁不得發泄上干於肺而咳嗽又不忌葷酒不避風寒誤服滋陰凝滯之藥肺竅閉而聲啞已經半載不能卻去脈息左手弦大右手滑大有力察其面色紅亮其痰亦不易咳出乃郁痰鬱火為患失於調治而然也理宜豁痰理氣之藥治之半夏栝蔞枳殼黃芩石羔杏仁蘇子炒研廣皮萊菔子炒研桔梗甘草桑白皮加生薑煎千墩李偉生胃中瘀血未盡用補澀之藥止之所以連年不愈屢次竊發此肝火下注肛門而肛門非氣虛下陷之故漫用補中益氣致肝火鬱而不舒所以後重逼迫肛門愈墜脈息滑大此胃中余瘀未盡肝火鬱而不舒去血而肛門不墜若腸紅無腹痛之理此係血痢故後重逼迫也補藥斷不可服白芍黃芩炒厚朴青皮山梔枳殼黃柏炒香附炒甘草丹參乍浦路又高向有咳嗽之病遇風寒即發此痰火咳嗽也今交夏令火旺之候胃中痰火為外邪觸動上干肺家而咳嗽愈作誤認為勞症以何首烏熟地枸杞溫補之藥閉其肺竅加之肥膩不忌咳嗽日甚咳久火炎於上擾其胃中之血而吐血內火不清銷爍肌肉凝滯之藥入胃糾結成痰不知飢飽飲食不進已經兩月精神困憊脈息左手帶弦右手滑大帶數此肝火妄動胃中之痰火燔灼肺金兼之舌苔紫色知伏火在內無疑也理宜和胃豁痰清火之藥治之半夏廣皮蘇子炒研杏仁栝蔞桔梗黃芩枳殼桑皮山梔石羔甘草加生薑煎雙林韓左相患怔忡三載不愈時醫俱用景岳之言而進補劑參耆地黃群補畢集日甚一日就診於余余用豁痰降火之藥一服其夜即大減後以溫膽湯加山梔川連石羔膽星棗仁丸服不一月而愈評景岳怔忡論崔場官令堂受病之源得之憂思抑鬱氣道不行津液聚而為痰阻滯不通所以胸膈不寬而滿悶外受暑熱之邪互相為患而為瘧疾內經云夏傷於暑秋必痎瘧寒熱止後頭昏而發暈此暑熱之邪上升也腰腿俱疼暑熱之邪流注而經絡作痛也胃中熱邪不清故胸膈不寬不思飲食亦無大害不可勉強恐邪氣與穀氣交相混淆則瘧來時勢熱不止變成大病而治療更難必待胃中邪氣清爽能知飢餓方可進谷因太太年高兼之七情內擾故難於奏效總之寬胸理氣為第一著胸膈一寬寒熱自止矣柴胡茯苓川樸香薷葛根萊菔子香附半夏橘紅青皮枳殼加姜青浦大西門徐錫昌去夏感受暑熱又為風寒鬱遏不得發越加之惱怒以動其肝火上干於胃而嘔吐小便不利腸中作瀉濕熱鬱於胃中而為腹腫隨肝火上升而頭面腫痛脈息弦而大此乃濕熱肝火蘊於脾胃之中不得發越之故也理宜清濕熱疏肝火利小便之藥治之半夏橘皮川樸枳殼葛根香附茯苓滑石香薷加姜前服加味香薷飲五六劑遂覺頭面輕鬆並以紫蘇鮮艾煎洗薰浴使邪氣從毫竅而發越再以此方服之白朮豬苓半夏山梔厚朴白茯苓澤瀉廣皮枳殼香附加熟砂仁末青浦大西門徐青岳腎水不足不能榮養肝木肝火鬱於胃中煅煉津液而成痰外為風寒所觸胃中之痰火上干肺家而為喘嗽不得臥之病脈息左手弦大右手滑大有力關部尤甚此肝家有鬱火胃中有痰也理宜豁痰理氣疏肝之藥治之暫用滾痰丸以逐胃中之痰瘀從大便而去以調補之藥為善後計否則恐成反胃噎膈之症也半夏橘紅香附蔞仁萊菔子青皮枳殼鬱金夏枯草加佛手姜上海東門張子敬初因風寒襲肺而咳嗽因不忌葷酒不避風寒日久傷肺而痰中帶紅已經數月其咳不止真陰受傷虛火爍肺而咽痛脈息虛細帶數面白色而無神稍有語言動作其氣即上逆而咳此腎氣虛不歸原也理宜滋陰補腎納氣保肺之藥煎丸並進靜養調攝不致釀成勞瘵也生地丹皮麥冬廣皮川貝五味蔞霜桑白皮骨皮苡仁加茅根煎丸方六味加黃柏牛膝砂仁麥冬五味王作舟令愛汗出而口不渴身熱壯熱大便通利面色唇口皆白此汗多亡陽也宜黃耆建中湯治之黃耆四錢白芍三錢桂枝五分半夏錢半廣皮錢半炙甘草五分大棗二枚生薑一片煎王作舟令愛復案前日自汗不止用黃耆建中湯得已汗止而安寐若謂餘邪未盡服之必口渴煩躁而不得臥今大便滑泄胸膈舒暢而知餓面色唇口原白又汗出不止將若之何仍以黃耆建中湯斂其汗用白朮以止其瀉不必他議黃耆白朮白芍桂枝棗仁五味炙甘草廣皮大棗黃維思令侄血症之後腎虛而肺氣受傷耳聾不聰自汗不止大便不實脈息數大無神夫耳聾腎絕也汗出氣脫也大便不實脾虛也此皆不治之症以補腎納氣之藥以安病者之心耳人參黃耆茯神棗仁枸杞白芍麥冬苡仁五味胡桃肉北一灶張於岡夫人肝火鬱於胃中不得疏泄以致胸膈不寬至春正月分娩之後肝火上衝於胃而嘔吐夫食即吐是有火也脈息弦滑帶數此肝氣鬱而為火以致結成有形之象按之和軟流走不定理宜和胃清肝之藥治之半夏茯苓香附山梔川連青皮白芍石羔加生薑竹茹茅根生鐵煎嘉興戴天昇案先天腎水不足不能榮養肝木肝火上升血隨火沸而吐屢次竊發今春木氣升騰之候而吐血又作脈息數而帶弦此水衰火亢之故也理宜滋陰降火之藥為治生地丹皮骨皮知母麥冬黃柏加茅根煎如體中覺有火氣上升恐其血來即以此方服之朝服丸方六味加麥冬知母黃柏五味牛膝砂仁晚服丸方天王補心丹已至六月初九日六灶張崧岩方案曾經跌撲損傷積瘀在胃日久乾結阻滯道路津液不通聚而為痰加之醇酒厚味其痰不能流通運行外為風寒所觸以致痰嗽氣急胸前妨礙不時厥逆用滾痰丸去瘀血不計去後又不時發厥其勢可畏胸膈間尚有宿瘀按之有形薰蒸於肺背發紅瘰此宿瘀日久鬱而為火用豁痰消瘀之藥不能開結用酒蒸大黃一錢臨臥服之清晨大便去黑瘀痰積然膠固日久難以速去因元氣虛邪氣實所謂虛中之實症也必得攻補兼施緩著處治庶得奏效而不傷元氣服清瘀豁痰煎劑以活動其瘀臨臥酒蒸大黃一錢或人參湯下服之一夜可以磨蕩其宿瘀漸次下行如此可以去根蒂也去後可用歸脾湯或六君子湯補養脾胃則飲食大進精血日旺乃收功善後之法也廣皮枳殼蔞仁半夏香附山梔桃仁歸尾鬱金黃芩牛膝加姜煎臨臥服酒蒸大黃丸二錢參湯下初十日厥逆已除惟覺胸膈作脹清晨大便去黑色黏膩之物不計此積散積行之佳兆也當以煎劑乘其勢而利導之半夏廣皮香附山梔萊菔子青皮白豆蔻炒去殼油川連另煎沖蔞仁厚朴滑石枳殼加姜煎初十午後食物停滯胃中以致惡寒胃火上蒸而為汗脈息滑而有力似乎有瘧之狀理宜豁痰疏理胃中之滯胸膈舒暢自然平安即以前方去豆蔻川連栝蔞滑石山梔加黃芩柴胡煎服十一日寒熱已止惡寒汗出亦較減惟胸膈依然不舒此胃中積瘀糾結不清之故也法當以理氣消瘀之藥為治香附山梔廣皮桃仁滑石歸尾半夏牛膝栝蔞實加生薑煎臨臥服大黃丸一錢滾湯下十一日午後胃中之瘀血盤踞日久乾結不散食入於胃阻滯不行故飲食少進內有鬱火外則凜凜畏寒非真外感風寒也肝氣下注於腎囊則睪丸脹痛必得小小丸藥逐去胃中之痰瘀使之下行則氣道流行而鬱火亦散桃仁一兩半夏一兩廣皮五錢鬱金五錢蔞實一兩香附五錢元明粉五錢枳殼五錢山梔五錢牛膝五錢滑石一兩為末夏枯草煎湯臨臥服十二日服大黃丸一錢大便去黑黏膩之物不計胸膈稍舒粥食加進一碗惟夜不安臥舌苔干黃此胸中痰瘀猶未清也夢遺者胃氣不清下注精房而腎不寧靜故遺泄也早晚當以散結消瘀之丸服之臨臥再服大黃丸一錢可也十三日胸腹按之少軟夜亦安臥舌色仍黃丸藥性緩力薄不能蕩其宿瘀下行當間用散結理氣消痰清火煎劑一帖臨臥仍服大黃丸一錢庶得結散結行胸膈舒暢也香附山梔川連枳殼半夏廣皮蔞實萊菔子青皮厚朴加姜煎十四日昨晚服大黃丸大便去五色敗濁之物升余胸膈舒暢夜亦安臥此結痰瘀血下行病退之佳兆也早晚仍以散結消瘀之丸滌其餘波十五日大便二日不解至晚胸膈作脹而酸夜不安寐此胃中餘波未盡肝火下注而陰囊脹大當以理氣疏肝清火煎劑治之臨臥並以礞石滾痰丸二錢服之以逐其餘波半夏廣皮枳殼萊菔子香附青皮山梔厚朴川連滑石加熟砂仁末生薑十六日昨晚服滾痰丸後大便隨解黑糞甚覺爽快惟夜不得寐而心中躁擾不寧陰囊腫大獨見於夜晝則依然和緩此肝火鬱於胃中胃不和故臥不安降下則陰囊脹大肝開竅於目晝則目開肝火由竅而泄夜則目合其火無從宣通故心燥囊腫也原評病之所在鑿鑿言之再宜散結開鬱和胃清火之藥治之半夏廣皮茯苓青皮川連枳殼香附山梔夏枯草加青竹茹生薑煎十七日昨晚自服藥之後頗覺舒適今午後過食燒餅停滯胃中不得消化阻其氣道以致胸膈作脹而氣急身熱暫以消導之藥治之即以十六日方加萊菔子厚朴煎十八日服疏理消導之藥胸膈隨即寬舒身涼氣平夜亦安臥陽事已痿月餘今能舉而夢遺此胃中之食物已化佳兆也當以理氣豁痰之藥治之半夏廣皮川連黃芩香附山梔枳殼青皮茯苓夏枯草萊菔子加生薑竹茹十九日服散結消瘀豁痰理氣清火等藥數日以來宿瘀痰積漸次而出粥食能進三碗步履如故此病去之佳兆也但胸次不能豁然舒暢臥則覺有黃瓜之形塞於胃中不時噯氣此濁氣布結於胃火土之氣鬱而不舒也至於口乾足熱乃郁久之火得以外達再以和胃清火理濁氣之藥為治即以十八日方去茯苓枯草竹茹黃芩加栝蔞煎服二十日脈息調和胸次黃瓜之形已無惟覺胸膈作脹不舒舌色帶黃噯氣不減此濁氣欲散而不能不得下降之故也理宜以疏理濁氣清肝火之藥丸服半夏廣皮香附山梔川連黃柏青皮枳殼萊菔子砂仁夏枯草煎湯法丸廿一日舌苔已無夜臥頗安睪丸不脹乾飯一碗甚覺有味而舒適但食後作脹而多驚此濁氣布於胸次不得下降也肝膽有火故稍涉聲響致即驚畏當以和胃理氣清肝之藥治之並以湯液潤滑之物潤其腸胃則大便自不燥結矣即以二十丸方加厚朴鉤藤栝蔞生薑煎服廿三日胸次稍舒乾飯可進盞半惟噯氣不減然濁氣有下降之漸故能食也當以前方減去黃柏專理滯氣為要廿四日胸膈滿悶而氣急惡風寒熱似瘧此係當風取涼而臥感冒風寒所致當以疏散清熱之藥為治柴胡半夏廣皮枳殼厚朴青皮白豆蔻黃芩川連加生薑砂仁廿七日寒熱已止氣急亦減但脈息弦大至晚猶覺凜凜似寒此內有鬱火外則凜凜乃瘧之基也飲食須宜調節風寒最要謹避至於胸次不時作脹此亦胃中余瘀未清濁氣壅滯不通之故也當以理氣和胃疏肝之藥治之臨臥服礞石滾痰丸二錢以逐胸中之餘瘀從大便而出則胃中清爽而胸膈自寬矣柴胡半夏廣皮枳殼萊菔子青皮黃芩厚朴香附栝蔞加生薑煎廿八日清晨大便去黏膩不計隨一次皆黑水而無渣滓有似乎湯藥解後胸次稍寬不一時仍覺滿悶晚來仍凜凜微寒蒸蒸微熱氣急而足冷此胃中糾結餘瘀猶未清爽而久滯之濁氣不得流通而降下也理宜開鬱降氣之藥治之以前方減去青皮加山梔滑石崔場官令堂內有郁痰鬱火外受暑熱之邪而成瘧痰所以胸膈不寬熱極則大小便下血脈息滑大有力此痰與瘀血互相糾結於胃也先以礞石滾痰丸逐其胸中之痰與瘀使其下行然後以豁痰清暑之藥治之半夏廣皮枳殼厚朴滑石青皮萊菔子柴胡黃芩加姜煎金山衛周倫序案素有瘡疾此脾虛而有濕熱也跡來胃中有痰肝家有鬱火暑熱之邪乘虛而襲所以胸膈不寬外畏風寒脈息左手沉弦右手滑大恐其發瘧而咳嗽理宜豁痰順氣清暑之藥治之柴胡半夏廣皮葛根枳殼厚朴黃芩萊菔子栝蔞加生薑香薷丸方半夏廣皮香附萊菔子栝蔞枳殼山梔黃芩蒺藜黃柏沈漢南胃中頑痰糾結日久阻礙道路鬱而為黃用清濕熱豁痰之藥黃色已退目下惟胃中根蒂尚未驅除暫用礞石滾痰丸錢半臨臥淡薑湯下以開其結使之下行胸膈得以舒暢然後以調補之策為善後之計半夏廣皮栝蔞萊菔子香附山梔川連白豆蔻枳殼加姜煎嘉興吳稼村先天腎不足相火上炎干胃則唇口時腫眼目多眵脈息數大無力此乃水衰火亢正當十六成人之時精氣不足理宜靜養戒醇酒辛辣之物服滋陰降火之藥不致釀成勞瘵也生地丹皮麥冬骨皮黃柏知母玉竹石羔茯苓加蓮子楊店孫允文令政肝火鬱於胃中不得疏泄以致嘈雜作酸經事不調脈息沉弦帶數此肝火鬱而不舒之故也理宜開鬱和胃清火之藥為治半夏廣皮香附山梔丹參黃芩枳殼青皮連翹加姜煎嘉興黃景章初夏時症發熱兩頤紅腫此少陽陽明邪熱所致理應疏少陽之邪清陽明之熱因滋陰太早致邪熱凝滯不得發越上干肺家而咳嗽痰中帶紅脈息數大無力已經日久其陰為邪熱所耗釀成勞瘵宜以滋陰降火保肺之藥為治生地骨皮丹皮蔞霜杏仁麥冬橘紅川貝黃柏知母五味子加蓮子十粒又腎納氣腎虛氣不能納藏於下故稍有語言動作其氣即上升而咳當以補腎納氣之丸朝服使氣上升則咳自止矣六味丸加知柏牛膝麥冬五味磁石蜜丸每服白滾湯下參湯尤妙嘉興吳汝林案胃中痰積糾結而成形阻其道路飲食不得下達月初連發瘧疾此因感受外邪而胃中痰積竊發也脈息左手弦右手滑大關部尤甚此胃中痰積膠固不清先用滾痰丸逐胃中之痰積從大便而出繼以豁痰理氣消積之藥治之半夏廣皮萊菔子香附枳殼青皮山查厚朴木香加姜煎崇明方集成平素多思多郁以致肝氣不得疏泄胸膈不舒去夏感受暑熱而咳嗽今已漸愈夏令咳嗽瘀血些少脈息左手沉弦右手滑澀有力此肝氣鬱滯肝為藏血之臟氣滯則血不流行而停滯於中隨火上升而吐蓋治血必先理氣氣行則血自化理宜開鬱疏肝清火之藥為治氣行則血流而胸膈自寬矣香附山梔歸尾鬱金枳殼丹參廣皮蘇子加茅根蘇州楊安浜呂道原案緣心事怫鬱肝膽之火上升充塞耳竅而作響不聰鼻竅亦不利誤用地黃丸補之其竅愈塞眉稜作痛已經日久投劑參差脈息左手弦右手滑大有力此係肝家有鬱火胃中有痰飲內經云九竅不利腸胃之所生也理宜和胃豁痰開鬱清火之藥為治並忌醇酒厚味戒惱怒躁急為要半夏廣皮香附山梔枳殼連翹石羔萊菔子薄荷甘草加石菖蒲根錢半生薑二片又痰火閉塞其竅以致鼻塞耳聾治法惟以理氣開竅豁痰清火之藥頻服自然奏效萬不可以補腎之藥壅塞其竅則成錮疾今酌丸方於後半夏廣皮香附山梔枳殼栝蔞石羔萊菔子連翹石菖蒲呂道原令郎出痘之時失於清火解毒以致發毒頸間結積累累而起脈大而火旺腎水為之耗消留以滋陰清火解毒之藥為治生地麥冬骨皮丹皮土貝銀花花粉黃柏知母夏枯草蘇州金維仁胃中濕熱痰飲氣滯不行鬱而為黃胸膈不寬飲食不能消化脈息左手沉弦右手滑大此肝家有鬱火胃中有痰飲濕熱不清之故也宜理氣豁痰清濕熱之藥治之半夏廣皮栝蔞枳殼厚朴香附山梔滑石木通青皮加姜煎潘廣川病起於脾胃受傷加之腎家不足致脹滿而大小便不禁因腎主二便脾主運化脾虛不足不能制水以致鼓脹前服胃苓湯大便去薄糞脾氣運化氣道轉輸此藥之對病也非煎劑不宜多服當服丸藥使之漸漸和軟飲食可進但食物須要調勻過多不能運化反致傷脾白朮蒼朮厚朴廣皮豬苓澤瀉茯苓肉桂白芍用荷葉湯法丸空心焦米湯下人參砂仁湯更妙徽州吳天具天稟強壯多郁善怒性嗜酒酒性大熱貯於胃中夜不得安臥脈息左手沉弦帶數右手滑大有力此係肝膽之火鬱於胃中煅煉津液成痰以致胃中不和而臥不安也恐冬令之後痰隨火升而顛仆為類中之疾治法宜以豁痰清火並忌醇酒厚味戒惱怒一交冬令自然卻去病蒂矣半夏廣皮茯苓甘草黃連石羔枳殼山梔香附加生薑竹茹石菖蒲根煎嘉興曹敬先三年前曾吐下瘀血不計左邊結成有形之塊按之堅實不痛鬱而不舒目下目睛見黃小便亦黃脈息左手沉澀有力右手洪滑有力此乃瘀血濕熱互相糾結鬱而為黃將來鼓脹之基也理宜清瘀行滯清濕熱之藥煎丸並進並忌醇酒厚味生冷等物不致釀成鼓疾也桃仁香附厚朴青皮蒼朮半夏滑石鬱金牛膝茵陳木通砂仁丸方本方去鬱金牛膝加栝蔞小梔桂枝廣皮用茵陳煎湯法丸千墩徐楚揍平昔好酒濕熱之鬱於胃者日久胸膈不舒眼目小便皆黃此乃黃疸之疾恐實而為鼓脹脈息弦滑有力此飲酒過度濕熱薰蒸之故也理宜清濕熱利小便之藥為治並忌醇酒厚味等物蒼朮厚朴廣皮半夏枳殼香附青皮滑石茵陳葛根海寧嚴長樞令堂經事久已不來周身肌肉作痛用針挑出其血得以稍舒此瘀血流注經絡之故也當以消瘀理氣之藥治之桃仁歸尾鬱金延胡索牛膝丹參香附山梔廣皮木通滑石加生薑煎嚴長樞案飽食用力則胃絡有損血積不散留於中宮隨火上升而吐血血皆厚而黏膩者此瘀血也誤以腎水不足虛火上炎之吐血而以補腎膩膈之藥填塞胸中積而成痰隨火下注精房則為夢遺用補澀之藥則胃中痰愈鬱而遺滑愈甚脈息弦滑有力此乃胃中之痰與肝家之鬱火故也準繩云遺滑之症屬郁者居大半庸醫不知其鬱用補澀之藥補澀愈覺鬱而不舒遺滑日甚胸膈不寬飲食少進甚則實為鼓脹理宜開鬱豁痰清火之藥為治胃中清爽則遺滑自止所謂澄其源而流自清也蒼朮厚朴廣皮半夏黃柏青皮香附山梔枳殼萊菔子甘草南翔楊簡修病起于思慮抑鬱肝木不能條達鬱於胃中至去冬一陽萌動之時木火發越而胃脘作痛流走不定時發寒熱肝膽之火上升左邊頭面腫脹腫處出水其火得泄而漸平至今春正月春令發生之時木火升騰而沖胃嘔逆不止而出大汗木火得以疏泄而漸安此汗系內火銷爍而出非氣虛自汗也痛則大便不通所謂通則不痛也痛則胸膈脹滿者肝木之性善脹郁而不得疏泄故脹而滿也痛時作酸者肝火鬱於胃亦以不得疏泄也兩脅與小腹皆肝部之分故痛則必連小腹兩脅痛時作脹作嘔作酸皆肝氣鬱而不舒之故治法惟以疏肝和胃為主診得脈息左手沉弦而小所以知其肝氣之鬱而不舒右手沉滑有力所以知其肝木鬱於脾土之中也半夏廣皮白芍甘草香附山梔青皮柴胡木通栝蔞又丸方服疏肝和胃之藥氣道宣通左手寸關已覺浮大此藥之對病也治法惟以疏肝和胃為主內經所謂木鬱則達之則胃脘之病自止矣煎劑多服恐傷胃氣當以丸藥進之前方加黃柏夏枯草木通煎湯法丸海寧徐南賓胃中郁痰鬱火糾結不清阻其道路胸膈不寬食物入胃難以運化而作脹流於四肢則為麻痹達於肌肉則發紅瘰而肌肉跳動不止胸中時覺冷氣上升者此熱極反寒反兼水化之制也脈息左手沉弦右手滑大此胃中郁痰鬱火糾結不清之故也宜先服滾痰丸三錢繼以豁痰清火之藥治之半夏廣皮萊菔子香附山梔石羔栝蔞黃柏牛膝蒺藜天麻加姜煎又郁痰鬱火濕熱為病用豁痰清濕熱之藥病已去其大半目下秋令收斂之時速宜驅逐胃中痰飲濕熱仍以滾痰丸二錢淡薑湯下逐其痰積從大便而出再服豁痰清濕熱理氣之藥一交冬令病蒂可卻矣半夏廣皮香附山梔天麻栝蔞厚朴石羔枳殼黃柏茯苓用木通湯法丸楊簡修令郎病起於硝黃火氣衝入於肺肺下無透竅外為寒邪閉之稍有所觸肺中之伏火上升而為喘急胃中之痰隨火上逆則夜不得安寐脈息左手沉弦右手寸關沉滑有力此乃肺中有伏火胃中有痰飲也當以清肺降氣豁痰之藥治之桔梗甘草廣皮桑皮蘇子杏仁石羔栝蔞枳殼黃芩蘆店朱君彩此症濕熱蘊蓄干胃發於肌肉而為紅瘰遍身搔癢誤以風治以致多汗而兩足麻痹此胃中之火上升而不下降之故脈息洪滑理宜清濕熱涼血之藥為治生地黃柏石羔蒺藜蒼朮厚朴香附山梔牛膝花粉太倉羅若洲熱而不寒者癉瘧也暑熱之邪蘊蓄於胃食物阻滯而為熱也脈息弦滑理宜清暑熱和胃氣之藥治之柴胡黃芩厚朴青皮半夏廣皮葛杞石羔枳殼姜新場葉子敬平昔有目疾乃肝火抑鬱所致木鬱於土中久矣鬱則氣道不能流通津液聚而為痰胃中糾結不清得外之暑熱互相為患而成瘧已經半月據云小腹有動氣則知木鬱不能條達面色白而帶青胸膈不寬則知胃中之痰積未清服過滾痰丸去結糞不爽快又用涼膈散大便猶不爽快解得薄糞始得通暢口亦不渴此胃中有痰之故脈息弦滑右關尤甚此係痰食氣滯而不得通暢也且無痰不成瘧無食不成瘧理當仍用滾痰丸二錢使胸中痰積可以蕩去萬一疑其虛而畏用去病之藥若至熱不止而有譫語之狀則難於調治小腹胸膈舒暢則瘧疾自止孫一奎云其病最難故先用攻擊以去其病病去而始補方得治法柴胡黃芩半夏廣皮青皮草果枳殼萊菔子香附滑石加生薑砂仁嘉善胡天球抑鬱不舒氣道不通外為寒邪所郁郁久生痰阻滯經絡周身肌肉麻木上升則頭眩暈冷汗時出脈息左手沉弦帶數此肝氣鬱而不舒也右手滑大有力此胃中有濕痰也理宜開鬱豁痰疏肝之藥並忌醇酒厚味等物半夏廣皮蒼朮厚朴香附黃柏天麻木通山梔枳殼嘉定高溯源讀書作文飯後寫字胃之上脘屈曲不舒有傷胃絡因而阻滯於上脘非一日矣今春為外邪觸動肺胃之火上升而咳嗽偶食肥膩之物阻滯肺竅其嗽停止而痰與瘀血互相糾結於上焦肺胃之間凝滯不通不能噯氣至六月間炎暑薰赫與內郁之火交相煽動痰與瘀血得熱則宣通流動隨火上升而吐紫黑黏膩之瘀血二三鍾胸膈稍寬然余瘀尚未清爽故不能豁然舒暢今交秋令收斂之時脈息左手沉弦右手滑大有力關部尤甚此肝抑鬱肺胃間痰火瘀滯不清之故也理宜消瘀理氣豁痰之藥為治大凡治血必先理氣氣行則痰與瘀滯自解而下行矣故血症有變而為惡痢者吉兆也桃仁歸尾牛膝枳殼丹參香附山梔栝蔞廣皮萊菔子加茅根煎服崇明施錦據述病情因食麵物之後冷水洗浴而當風臥其食停滯於胃雖消化而無形之氣尚未消散後復因惱怒抑鬱其肝氣不得疏泄食物為之阻滯誤為真火衰弱服八味艾火灸其胃脘內郁之滯氣得桂附之性暫為宣通似乎相安而實胃家之鬱滯愈結因脾胃在右故右邊獨阻格左邊通暢者因肝氣鬱於肺胃之中故左通而右塞也飲食過度壅塞氣道結成有形之塊居於臍上郁久成火上衝於頭故右邊頭上汗出而不止以手摩摸氣散而下行其塊消而汗止此乃肝氣鬱而不舒假氣以成塊氣有餘便是火上衝則汗出降下則汗止此木鬱於脾土之症也理宜疏氣和脾胃降沖逆之火自然平安矣香附青皮山梔廣皮半夏茯苓萊菔子厚朴黃柏加生薑砂仁煎病久湯藥一時不能奏效當以扶脾疏肝降火丸藥服之丸方白朮廣皮半夏茯苓香附青皮山梔黃柏厚朴砂仁用荷葉煎湯法丸高溯源服消瘀行滯之藥三劑胸膈稍舒大便下黑瘀不計此下行之佳兆也但胃之上脘至大腸其道甚遠曲折難以下行當以小丸劑臨臥服之使其瘀血漸漸解散陸續下行從大便而出兼以煎劑間服之為要前方即以前方加鬱金滑石丸方即以煎方加夏枯草法丸崇明範錫凡內有郁痰鬱火外受風寒遏於肺胃之間不得發泄外邪觸動胃中之痰火上干肺家而為喘急不得臥嗽出黃痰方得安枕脈息左手沉弦右手滑大有力此乃肺胃中有郁痰鬱火糾結不清稍有動觸即時竊發此痰火之哮喘也理宜豁痰降氣清火之藥為治並忌醇酒厚味等物胃中請爽而痰不生一交春令病蒂卻矣半夏廣皮蘇子杏仁石羔萊菔子黃芩桑皮甘草蔞仁枳殼加姜煎膏方即以煎方去桑皮甘草萊菔子加梨汁萊菔汁地慄汁蘆根汁竹瀝薑汁用飴糖四兩烊入收貯燉熱不時挑化崇明顧蒼求先天腎水不足不能榮養肝木上升心神不寧脈息虛大兩尺尤甚又兼脾胃衰弱以致飲食少進四肢倦怠乏力理宜加味歸脾湯培養心肝加味地黃九補腎益精兼之保養調攝不致釀成不足之症也人參黃耆白朮茯神棗仁歸身廣皮甘草遠志五味麥冬加桂圓肉十枚早服丸方六味丸加枸杞麥冬兔絲餅棗仁五味蜜丸參湯下暮服丸方即以前方去人參麥冬五味加砂仁建蓮荷葉湯法丸崇明熊天祥肝家有鬱火胃中有痰飲痰隨火升則頭額作痛痛極則嘔吐酸水肝火發越則頭痛止脈息左手沉弦帶數右手沉滑此痰厥頭痛俗名頭風是也理宜清肝火化痰飲之藥為治柴胡半夏廣皮山梔黃連天麻鉤藤香附夏枯草茯苓加生薑竹茹丸方即以煎方加青皮石羔白芍用生薑一兩竹茹四兩荷蒂三十枚煎湯法丸一人患腹脹臍平而青筋四起其初因食糰子而發為制一方而勢減大半紫厚朴香附山梔滑石黃柏廣皮萊菔子蔞實枳殼青皮砂仁木通有壯年人患腰痛在腎穴處不能行走初起一邊後至兩邊及中間又後在兩腿上灣作陣而痛有時停止此流火痛也黃柏木通連翹蔞仁枳殼山梔黃芩香附花粉加酒炒嫩桑枝有因酒後而患腹痛漸至腫脹臍平而面黃服藥十帖而大減初定之方半夏廣皮厚朴枳殼青皮香附萊菔子葛根滑石木通砂仁加入十帖後又加蒼朮栝蔞去葛根滑石丸服而安有一十四歲女子患小腹痛無他症此因飲冷所致歸尾桃仁香附青皮延胡索丹參牛膝條芩山梔砂仁有一十六歲男子患癧子內熱生地丹皮麥冬骨皮黃柏知母土貝山梔花粉加夏枯草一男子患骨節痛無他症蒼朮黃柏秦艽術通鉤藤連翹枳殼木瓜一人患休息痢三年白芍甘草黃芩滑石厚朴枳殼香附山梔青皮一女人素患小產經至必二十日余兼白帶生地丹皮香附黃柏黃芩棗仁麥冬歸身白芍一婦黃疸身發瘡癢蒼朮厚朴黃柏黃芩山梔木通連翹防風茵陳廣皮加燈草一男子患左足痠痛漸漸不能行走並不能起立出入賴人揹負小腹左邊有一塊作患此痛痹也蒼朮黃柏牛膝青皮木瓜香附山梔秦艽連翹木通石羔加酒炒桑枝三錢一老人患莖中痛溺即痛甚所溺者紫色溺畢又覺大便內裡急後重夜不能寐小便更甚生地麥冬丹皮黃柏鹽水炒知母枳殼山梔黃芩白芍加炒仁茅根甘草服數帖而愈一人吐血咳嗽聲啞所吐之血濃厚肌肉亦不消瘦麥冬生地蘇子杏仁桑皮貝母黃芩山梔桔梗一婦人經將來氣痛極甚香附青皮延胡索黃芩丹參厚朴桃仁赤芍甘草一書客患痢三年腹亦不痛食亦不減便時覺熱肛門脫下便畢即抬上按其腹微堅白芍黃芩甘草木香青皮香附枳殼穀芽山查黃柏厚朴加砂仁乾荷蒂一婦小產後血水淋漓不止一月五六至困倦乏力唇面無血色白芍黃芩甘草山梔枳殼丹參香附續斷益母草丹皮棗仁加荷蒂有男子夜間患右頸腫痛下至背旦即診視防風荊芥連翹桔梗薄荷枳殼甘草黃芩山梔四帖而愈一後生患左脅痛吐鮮血不絕生地丹皮丹參蘇子山梔黃芩白芍鬱金黃柏牛膝加茅根沖童便一盞一男子患腹大而軟形體消瘦醫傢俱以勞治問其始病之由大約因前此瘧疾而不忌口暑熱未清所以至今夜間尚有身熱並日里亦不時潮熱等症柴胡厚朴青皮半夏廣皮黃芩甘草生薑枳殼一人患胸中作痛按之而軟得食稍緩夜間尤甚乃火痛也白芍甘草山梔黃芩半夏廣皮蔞實夏枯草一人言心頭痛乃胃脘為肝火所郁也諸醫用黃連治之不愈其人又善酒為定一方而愈白芍甘草山梔黃芩栝蔞實石羔葛根香附枳殼連翹一婦人患泄瀉清晨更甚為日已久面黃乏力此係脾受木克理宜疏肝扶脾之藥治之白朮茯苓白芍廣皮香附豬苓澤瀉厚朴甘草加乾荷葉桐鄉程丹宇向善啖家頗豐膏粱不輟於口致患郁痰鬱火症數年來不飢而勉食每立秋則發瘧治療者無非以六君子湯補其脾胃去冬又服鹿角膠數斤至庚戌春初潦倒不堪不能步履始就醫於余見其喘急異常喉如鋸聲口吐黃黑黏痰不計按其腹脹大堅實四肢頭皮皆腫大小便不爽得成鼓脹脈息滑大有力余知其積年之痰鬱於中者既久無從出路而為患病勢至此無可奈何且與豁痰理氣之藥兩進不見進退因思數年積聚膠固堅結必非尋常即用滾痰丸三錢以逐之大便難去不甚爽快繼又連服五次大便去黏痰甚多並以豁痰清火降氣之藥早晚托化胸次稍舒時交清明節其內郁之火外達寒熱大作煩躁不寧即用黃連清火之藥兩劑得以安寧但郁久之火用疏而反熾不能清爽下注陰囊腫痛難忍小便點點不出以滋腎丸與之小便始得通利而陰囊之腫漸平其如外症除而飲食不進精神倦怠三月間初同伊歸途中忽患惡寒面色無神脈息虛滑几几欲脫狀急與獨參湯飲之一晚計服人參六錢神氣稍復抵家後大便每日去純白痰不計四肢腫脹漸退但神氣不清妄笑多怒飲食不進余曰此久病之後元氣虛而痰火散漫上干心主所致宜用疏補兼施之法遂以豁痰理氣清心火之品作丸服之晚用參橘煎二錢三日後神氣清爽脈亦有神飲食有味小便大利腫勢盡平瀕危之疾至此始無慮矣竟遵東垣先生疏補之法調治而愈三日後精神旺飲食進而談笑如常矣以數年之病來就余醫其間用藥變化一則知醫貴乎圓通矣噫是役也使慮其危殆而攻伐不施則病邪何由而去若干疏導而不事滋補則元氣何以漸充病勢變易不常方藥隨手撒換是知膠固之士未可與言醫也原注凡於久積之後邪去反有別症先以言明病家可無怨語飲食阻滯於胃鬱而為火煅煉津液成痰外為風寒所觸上干於肺而咳嗽痰帶粉紅色此係咳傷肺絡而來左脈弦細而數右脈寸關滑大此乃肝家有火肺胃之痰糾結不清也理宜豁痰降氣清火之藥治之蘇子杏仁栝蔞黃芩貝母枳殼桔梗山梔廣皮桑皮甘草加茅根一兩枇杷葉三錢煎服丸方桔梗甘草栝蔞霜杏仁貝母黃芩廣皮鬱金山梔枇杷葉夏枯草湯法丸臨臥服先天腎水不足相火妄動上炎爍肺而咳嗽脈息數大兩尺尤甚此乃水衰火亢下流於肛門而發毒目下時令炎威正肺金受制之月先宜靜養毋躁急惱怒省言語避風熱然後以滋陰保肺納氣降火之藥治之煎丸並進庶不釀成勞瘵也生地丹皮麥冬骨皮貝母蔞仁苡仁沙參白芍黃芩甘草加茅根一兩煎丸方六味丸加知母黃柏牛膝麥冬磁石砂仁肺為嬌臟畏熱畏寒醇酒生冷夾雜入胃不得運行釀成臭穢之痰肺金受爍因咳而出似乎肺癰實由胃中而來但薰灼日久肺氣為之耗散則水之上源已絕腎水因之虧損所以左手脈息虛軟右手滑大此皆水衰火亢肺金不足理宜用豁痰清肺之藥以治其痰嗽更以加味地黃丸補腎降火庶得奏效煎方栝蔞川貝薏仁丹皮骨皮麥冬廣皮沙參枳殼蘇子加枇杷葉三錢肺居上焦藥力最為難到凡嗽病當以膏劑頻頻挑化以滋肺金膏方川貝栝蔞廣皮生地麥門冬地骨皮杏仁枇杷葉沙參苡仁茅根鮮百合收自然膏燉熱不時挑化丸方六味加黃柏牛膝麥冬五味砂仁末為衣頭痛而嘔吐者乃胃中之痰火上升名曰痰厥頭痛藥不可服發表之藥半夏廣皮石羔夏枯草茯苓藿香香附白芍天麻甘草喘症乃肺有伏火觸風而發也應降氣豁痰以治其標平復之後應納氣歸腎以治其本半夏廣皮蘇子杏仁蔞仁黃芩五羔枳殼萊菔子甘草煎丸方用六味加牛膝黃柏磁石五味砂仁天稟沉靜未免多思多郁多思則氣結多鬱則肝木不得疏泄脾土受困加之飲食不調以致飲食不化而致泄瀉經云濕勝則濡泄又云諸濕腫滿皆屬於脾脾不運化濕氣聚而為腫目下腹皮漸大頭面四肢陰囊陽道俱腫脈息沉小暫用東垣風能勝濕之治然後以加減胃苓湯作丸服之緩著處治庶可奏效羌活防風香附廣皮枳殼厚朴蒼朮香薷砂仁加姜煎丸方蒼朮白朮厚朴茯苓豬苓澤瀉香附木香砂仁肉桂木通湯法丸童年而小便渾濁乃疳積也熱久則腹脹肌肉消瘦即幼科所謂疳火且脈息數大內火消爍所以善食理宜清火消積之藥治之白朮廣皮黃連骨皮楂肉麥芽茯苓銀柴胡砂仁病起於酒熱傷胃胃脘作痛血熱妄行而吐血火來爍金而咳嗽久嗽傷肺不能清肅下降小便不利以致足跗浮腫恐其漸升於上脈息弦數煩躁咽乾此乃胃熱傷肺宜清肺胃之熱降氣豁痰為主煎方半夏廣皮麥冬蘇子杏仁栝蔞石羔茯苓地骨皮加燈心丸方六味加牛膝黃柏麥冬天冬磁石砂仁病起於抑鬱不舒鬱則肝氣不得疏泄血為氣滯而停蓄之久則血大下去血之後肝火升騰肺金受爍以致咳嗽氣急肺失清肅降下之令小便不利而為脹滿氣喘不得安臥脈息沉弦而數此肝金鬱火爍肺而為喘急不得臥而腫治法當以清肺為主所謂先咳嗽後腫滿者治在肺肺清則便利而腫退矣朝服滋腎丸晚服煎方半夏廣皮栝蔞黃芩蘇子枳殼杏仁萊菔子香附山梔去夏水衰火亢而吐血今當夏令炎威其氣上逆而不能下降脈息洪大帶數兩尺尤甚此腎虛而氣不歸元也治宜滋陰降火納氣歸元為主並宜習靜調攝不然恐其復發吐血釀成勞瘵也煎方生地丹皮麥冬骨皮黃柏牛膝天冬玉竹白芍五味砂仁丸方六味加黃柏牛膝五味麥冬砂仁平素善飲酒性大熱貯於胃中薰蒸爍肺擾其血分胃中之血隨火上升而吐既吐之後腎水衰耗相火上炎而咳嗽作矣下擾精房而夢遺矣脈息弦數兩尺尤甚此乃水衰火亢肺金受困之象調治先講靜養毋躁急惱怒服納氣補腎清火保肺之藥煎丸並進庶幾漸次奏效煎方生地丹皮麥冬天冬川貝地骨皮沙參栝蔞仁苡仁加茅根丸方六味加黃柏牛膝砂仁五味子磁石用力過度有傷胃絡陽絡傷則血外溢所來之血不鮮明者乃瘀血阻滯胃中而不舒暢加之醇酒擾其血沸騰脈息滑大有力此瘀血互相糾結於胃也暫用豁痰理氣消瘀之藥治之煎方蘇子鬱金栝蔞枳殼桃仁黃芩山梔香附丹參加茅根丸方生地桃仁蔞仁鬱金廣皮枳殼香附山梔丹參青皮黃芩茅根湯法濕熱下流而為痛痹當以加味三妙丸治之蒼朮黃柏牛膝木瓜苡仁秦艽續斷杜仲桑枝湯法丸所患血症已經多年雖用滋陰降火之藥或愈或發今交夏令肺金受爍之月咳嗽不已血隨火沸上氣喘急午後發熱飲食少進而無味脈息細數無神此乃腎虛而兼脾胃之氣困憊也目下當以胃氣為主先賢治血症每以胃藥收功而滋陰寒涼之藥暫作緩圖俟飲食時神氣旺然後再議滋陰可也煎方人參黃耆白朮茯神廣皮麥冬五味棗仁苡仁貝母甘草加大棗二枚熟砂仁末五分服扶脾保肺之藥若飲食漸進乃為佳兆如覺有火嗽甚即停前藥仍用滋陰保肺之劑但居恆刻刻以胃氣為本生冷難化之物俱不可用防其大便滑泄也煎方熟地白芍麥冬玉竹貝母廣皮苡仁五味枸杞加蓮子肝開竅於目瞽目之人肝氣鬱滯肝為藏血之臟氣滯則血不流經事不調腹中作痛經行之時其血皆黑而成塊者此乃氣滯其血也宜理氣消瘀之藥治之香附青皮桃仁赤芍枳殼牛膝續斷厚朴滑石沖熟砂仁末丸方四制香附四兩桃仁元胡索鬱金青皮丹參牛膝條芩益母湯法丸少年時用力過度兼之飲食太過胃絡受傷陰絡傷則血內溢停蓄於腸胃之中而成便血肝火下注則發為痔瘡有時變為血痢痢雖止而所瘀之血逆上而吐胸膈咽噎之間窒塞不舒脈息左手沉弦帶數右手稍大於左而帶滑此係腸胃瘀郁之血尚未清爽氣滯痰凝郁久成火所以手足心煩熱胃中糾結堅硬有形而痛也理宜消瘀順氣清火之藥治之俟胸膈舒暢咽喉清爽然後以調理之藥為善計香附鬱金栝蔞蘇子山梔黃芩枳殼丹參丹皮青皮加乾荷蒂三枚三月間木旺之時脾土受制得目疾數日此皆肝火上炎之故四月間胃脘為物所觸雖覺不舒然亦不作痛脹滿已服消瘀行血之藥而胸腹反覺滿悶作脹小便黃赤而短少脈息弦細而沉此乃肝木鬱於脾上之中濕熱聚而為脹理宜疏肝散濕熱之藥治之香薷厚朴廣皮蒼朮枳殼青皮山梔木通葛根滑石萊菔子加砂仁生薑煎服疏肝清濕熱之藥三帖大便泄瀉已減但胃中有物阻滯食物不得下達暫用滾痰丸二錢淡薑湯下以逐胃中之滯使之下行並以理氣豁痰之藥連進四帖得脹滿漸減為妙半夏廣皮香附山梔枳殼青皮滑石萊菔子厚朴加砂仁脾氣已虛肝木不能條達通暢以致作脹小便不利大便不實此乃木旺土衰之象理宜扶脾疏肝之藥治之白朮茯苓廣皮半夏豬苓澤瀉厚朴香附山梔青皮鬱金砂仁加生薑煎丸方白朮茯苓豬苓澤瀉香附厚朴廣皮半夏山梔木香用木通四兩煎湯法丸朝晚服咳嗽痰多胸膈不舒飲食少進脈息虛弦系脾虛不能運行其津液而為痰土不能生金肺虛不能固表又當夏令濕熱用事之時暫以豁痰健脾保肺之藥治之候胸次舒暢然後以加味地黃丸補腎為長久之計暫服煎方白朮茯苓半夏廣皮蘇子杏仁苡仁骨皮桑皮加生薑沖熟砂仁末丸方白朮茯苓半夏廣皮蔞實杏仁霜黃柏骨皮砂仁枇杷葉用荷葉湯法丸左半身不遂而痛此係痰火鬱滯經絡不宣通之故理宜豁痰清火通經絡之藥治之半夏廣皮天麻秦艽鉤藤黃柏栝蔞木通續斷牛膝枳殼加生薑桑枝吐瘀血之後而為脹滿足跗腫硬大便溏泄此因平素飲酒太過傷其血分以致積於胃中隨火上炎而吐余瘀未盡氣滯不行濕熱聚而腫脹宜消瘀行氣清濕熱之藥治之煎方香附山梔青皮延胡索廣皮厚朴枳殼葛根木通加砂仁丸方白朮茯苓豬苓澤瀉香附青皮山梔枳殼厚朴砂仁木通湯法丸奔走勞動有傷於腎腎水不足相火上炎爍肺而咳嗽今咳雖減而真陰虧損脈息細數兩尺尤甚所以勞倦乏力兩足痿軟當以滋陰保肺之藥為治生地熟地麥冬天冬川貝栝蔞丹皮廣皮黃柏知母地骨加蓮子煎丸方用六味加牛膝麥冬五味砂仁黃柏少腹右邊結成有形之塊日漸以大上干胃家則嘔吐而發寒熱此乃瘕聚借其氣以成形即為子疝也近因散而至於左邊作痛不寧脈息弦急當以疏肝和胃為治半夏廣皮青皮香附栝蔞山梔黃柏鉤藤夏枯草柴胡甘草加姜煎丸方加橘核砂仁夏枯草湯法丸病起於肝氣不舒而成脹滿雖用行藥通其大便而漸減此肝氣得以疏泄而退然肝氣鬱於脾土之中而復脹脈息弦數此乃木旺火衰之象理宜和胃疏肝為治白朮廣皮厚朴香附木通山梔黃柏茯苓白芍枳殼丸方黃柏一兩知母一兩肉桂一錢水搗丸服服後候小便利再服後丸方丸方白朮廣皮茯苓山梔黃柏厚朴青皮澤瀉枳殼萊菔子木通湯法丸濕熱鬱蒸而為黃疸因胃中有濕熱所以作脹作酸作腫並有帶下脈息滑大治宜清濕熱之藥為主蒼朮黃柏厚朴廣皮香附茵陳木通滑石萊菔子山梔加燈心丸方青皮半夏蒼朮黃柏厚朴廣皮香附山梔茯苓用茵陳木通煎湯法丸經云三陽結謂之膈三陽者大小腸膀胱也結者熱結也熱結於下則反之於上丹溪云噎膈之症多起於血枯痰膩大忌香燥熱藥惟以豁痰降氣清火潤腸之藥治之今脈左手沉弦此肝氣鬱結也右手滑大有力此胃中痰火糾結不清也鬱則氣結津液聚而為痰阻滯食物不得下達隨肝家之鬱火上升則嘔吐而出原評理明詞達言之瞭然先講習靜調攝一切俗務俱置度外然後進藥庶幾奏效半夏廣皮香附山梔栝蔞蘇子萊菔子黃芩石羔枳殼加生薑竹茹平素善飲則知胃中濕熱糾結不清濕勝則濡泄所以大便泄瀉濕傷筋所以手足牽引濕生熱熱生風肝主風肝開竅於目所以左目小而右目大脈息左弦右滑此乃肝木乘脾也原評語皆有本如洞見五臟理宜扶脾疏肝為治白朮半夏廣皮茯苓鉤藤厚朴木瓜香附白芍車前咳嗽之後脾胃兩虛以致五更泄瀉此乃腎虛不能閉藏脾虛不能健運之故也脈息虛小無神理宜健脾和胃之劑先服煎劑以健其脾忌生冷油膩使易於運化也煎方人參白朮廣皮茯苓黃耆白芍甘草苡仁五味砂仁加荷蒂丸方補骨脂肉果五味子木香薑棗搗丸名四神丸疝症屬肝經鬱火不得疏泄外受寒涼所束以致腫脹作痛而上升理宜疏肝氣清肝火煎方柴胡青皮香附山梔木通黃柏橘核栝蔞蒼朮牛膝加砂仁丸方蒼朮黃柏香附青皮牛膝山梔橘核枳殼木通湯法丸浴方蘇葉艾葉水晶葡萄葉煎湯熱浴咳嗽吐痰帶血尺脈不寧夜臥不寧夢寐顛倒煎方生地丹皮麥冬山梔黃芩黃柏知母蘇子杏仁加茅根丸方知柏六味丸加牛膝白芍棗仁咳嗽已久性情多郁產後飲食少進而胸膈不寬或時作酸作脹大便不實脈息弦數而細脾土虛而肝木鬱肝火來爍肺金也暫用扶脾疏肝之藥使胸次舒暢然後以滋陰培本為善後計煎方香附山梔白芍半夏廣皮茯苓白朮蘇子杏仁鉤藤加姜丸方白朮廣皮半夏茯苓香附白芍山梔杏仁川貝枇杷葉荷葉湯法丸胃中痰飲積聚不清上泛於目以致目睛昏瞀胸膈不舒飲食不能運化脈息弦而帶數右手滑大此係肝木鬱於胃中隨火上泛而為嘔也理宜和胃豁痰燥濕清肝之藥蒼朮厚朴石羔枳殼蒺藜夏枯草半夏廣皮青皮香附加姜竹茹丸方半夏廣皮厚朴蒼朮石羔蒺藜茯苓香附砂仁用生薑竹茹夏枯草湯法丸胎前內熱肝火不得疏泄下注而為泄瀉經所謂暴注下迫皆屬於火既產之後時當春令正木火生髮之月未清之血停滯下焦發為腸癰膿潰之後復為痢疾後重逼迫腹中作痛肝火上升則目眵不清且煅煉津液而為帶下之症脈息弦數面色白而帶紅此皆肝火煽動也治宜清肝火疏肝氣之藥為主煎方白芍甘草黃芩連樸廣皮枳殼香附茯苓加荷蒂丸方白芍甘草香附枳殼黃芩茯苓黃柏續斷砂仁荷葉湯法經云治病必求其本本者謂究其治病之根蒂也喻嘉言曰先議病後議藥先生之病已經數載而致病之源緣先天腎水不足不能榮養肝木肝火上衝於胃胃中津液為火煅煉而成痰糾結不清薰蒸清虛之府鼻竅閉塞以致瘜肉內生肺雖開竅於鼻而其經絡屬胃胃脈挾鼻孔因胃中之痰火閉塞其竅也胃脈縈於面環唇口肝火衝動則口唇與面肌肉牽引而動肺之脈絡從胸走手經云諸氣膹郁皆屬於肺肺氣壅塞不通則由其經而注於手寸口魚際之脈跳動因肺朝百脈合於寸口也然腎為生痰之源胃為貯痰之器行則為津液聚則為痰飲得外風寒所觸痰火內發則口眼為之歪斜口屬胃眼屬肝木火煽動之故也年來雖不為意恐痰火鬱於胃中日久乘元氣不足之時外邪干入內之痰火竊發升騰眩暈卒然有顛仆之虞乃類中之基況向交秋即發瘧疾亦是胃中之痰因夏令之暑邪藏蓄於胃得風寒所觸而發所謂無痰不成瘧瘧外發則痰亦得以外達不致攢而為患診脈左手弦大右手骨大不靜此胃中之痰不清也調治之法必先清胃中之痰火通其閉塞之竅使肺氣清肅下降然後滋水榮木之藥治之丸方半夏廣皮茯苓栝蔞枳殼萊菔子石羔菖蒲黃芩天麻用生薑鉤藤湯法丸胃中清爽鼻息通利肌肉不跳動然後服後丸方六味加黃柏牛膝麥冬玉竹葉少遊從外家歸覆舟閘港眾人挽救得蘇歸家發熱咳嗽鼻流腥穢之水所吐之痰亦覺腥穢四五日大吐瘀血盆許諸醫欲以吐血治之余獨不然此為寒所注肺胃中受濁水所傷鬱而為熱瘀血乘機而吐出若用涼血滋陰之藥肺胃壅瘀不清發熱不清咳嗽必然更甚惟以理氣清肺豁痰等劑二十餘帖臭穢之物得以清爽寒熱咳嗽皆平而愈前胡蘇子半夏廣皮杏仁枳殼鬱金桑枝桔梗香附甘草孫特士平素善飲於三月間飲酒已醉臥於橋上墮水抱於橋腳一二時鄰人始得救起覺渾身頭項筋脈不舒灑淅惡寒即往松郡賣布有醫者不行疏散竟以勞倦治之歸家咳嗽繼之吐血又一醫者用地黃湯治之胸膈不寬亦不沉餓寒熱如瘧又以瘧疾治之此乃形寒飲冷肺受水注鬱而發熱咳嗽此時未免有傷瘀血凝滯胃家咳嗽氣逆隨之而出不去消導行瘀反用地黃凝滯之藥壅塞道路其勢更甚其氣愈逆彼為無子抑鬱脈息數大無倫余亦議其內敗雖用疏理之藥亦不取效此症與少遊相同但其誤用地黃凝滯竟至不起秦照臨夏月感受暑熱之邪至秋患痢不數日下藥行之積物不忌壅塞胃中不得通泰火邪不得發越以致呃逆面赤兩目俱紅舌見黑苔大便後重小便黃赤脈息沉細而數此熱邪為食物郁遏不得條達通暢而為呃逆暫用厚朴枳殼青皮萊菔子香附檳榔木通滑石疏其胃中之壅滯大便去結糞與積滯不計胸次寬泰伏火內發舌愈黑燥口渴喜冷用六一散水調服並西瓜汁蔗汁陸續飲之以石羔黃連枳殼連翹厚朴朝服一劑二日共計六一散二十餘碗西瓜數枚舌退黑而呃亦止口亦不渴面目之紅皆退小便清白大便爽快積滯已無脈息反大而不伏然後進以粥飲調胃此因暑邪郁遏於內寒涼太早兼之食物壅滯而成此症故必疏理腸胃之鬱滯使之宣通無阻後用清火涼藥冷水西瓜逐其火邪使之下行得以全愈若不先疏理而竟用寒涼則熱邪郁遏腸胃必致敗壞而斃所以用藥之法先後不可紊也上洋周湘文年已五旬三月間步至松郡百里忍飢面紅脈大汗出如雨口不渴神思倦怠夜不能寐諸醫皆以石羔黃連清火為治迎余診視余曰此熱傷元氣加之勞倦內傷肺氣不能固表脾虛而倦也人參黃耆白朮廣皮麥冬五味子棗仁連進二劑汗斂安寐胃開竅於口口糜者胃中濕痰濕火薰蒸於上也耳聾而鳴者胃中之痰隨少陽之火上升閉其竅而聾也肝竅開於目肝火鬱於胃中不得條達通暢以致目昏頭眩經云頭眩耳鳴九竅不利腸胃之所生也皆屬胃中有郁痰濕火凝結不清故有噁心嘔吐作酸胸膈不舒等症也以和胃清肝開鬱之藥為主但久服黃連反增燥熱二十年來不時用之未免有偏勝之害不若用黃柏以清龍雷之火而兼補腎東垣每於脾胃用以瀉陰火良有以也潘蒼舒令愛產後調理失宜腹痛泄瀉寒熱自汗小腹按之有塊作痛頭面白而浮腫兩腿脹痛脹息細小不安寐初服消瘀行滯之藥五六帖腫痛漸減即以消補兼治之法為療白朮廣皮茯苓白芍香附肉桂青皮山查棗仁甘草宛老患休息痢已經二載脈息洪大帶數腹皮如絡小便黃赤而不禁有時夢遺恐其發熱咳嗽釀成勞瘵因久痢傷腎故也治宜補腎為主此治本之法也久痢傷腎釀成陰虛之症目下陰火上衝飲食不得下達而嘔逆脈息細數聲音不出此乃水衰火亢肺金爍理宜滋陰保肺降火之藥治之六味湯加黃柏麥冬白芍牛膝沖砂仁末膏方生地麥冬白芍丹皮苡仁玉竹川貝地骨鮮百合枇杷葉丸方六味加黃柏牛膝五味麥冬杜仲砂仁為衣恪修兄腎水不足相火上炎血隨火升繼之咳嗽已經半載有餘脈息虛大帶數尺部尤甚此乃勞瘵之基也理宜靜養調攝屏卻俗務服滋陰降火之藥為治生地丹皮麥冬熟地天冬川貝骨皮栝蔞霜苡仁沙參加枇杷葉丸方六味加牛膝五味麥冬砂仁黃柏血症之後肺金受火燔灼而咳此本原病也目下感受暑風之邪咳嗽而頭痛脈息浮大而虛此外邪乘虛而侵肺也暫用清肺理氣疏散之藥俟前症減後再進補劑蘇子杏仁桔梗枳殼前胡黃芩廣皮薄荷桑皮甘草加姜朱煥輿四月起右腳底腫痛漸至四肢骨節疼痛不隨運用八月又加乾咳嗽胃中常易受寒目今頭項不能轉動頭俯不能仰視兩肩不舉轉側俱要人扶兩手無力臥則臀壓脅難於移動手指不能舉捧足心發熱午後更甚且作癢腰下至腳皮膚繃急骨節痠痛不能步履右腳更甚嗽吐黏綿痰涎沫大便乾結四五日一次糞後間有紅語言多句氣即不能接續必有乾咳尊體肥厚丹溪云肥人多濕痰四月乃純陽之月熱氣薰蒸下流於右足底以致腫痛右屬脾胃濕勝則腫四肢亦屬脾胃胃中濕痰壅滯無從出路流於四肢骨節而手足不能運用此乃痿痹之症屬濕痰濕火蘊蓄於腸胃腸胃不能容受流及於四肢肌肉之間而為患也原評能識病源故許多病症皆滴滴歸源且有確據非同俗醫之循牆傍壁附會其說者比也其痰上干於肺則為咳嗽肺主皮毛故易於感冒肝主筋頭頸皆屬肝濕傷筋故頭不轉動俯不能仰視兩肩不舉濕勝則體重故不能轉輸運動濕熱下流則腳底熱午後陽火亢盛助其邪氣故其熱更甚而作癢濕熱下注故皮膚繃急骨節作痛不能步履脾胃在右病在脾胃故右更甚胃為貯痰之器胃中熱氣薰蒸煅煉津液成痰隨火上升而咳嗽大便燥結者熱藥補劑壅塞不通之故也血得熱而妄行熱藥擾其血分則糞後見紅肺氣壅盛則語言不能通暢而接續火氣上炎爍肺則乾咳脈息沉滑有力種種見症皆屬濕痰濕火蘊蓄於腸胃流於四肢而為痿痹之症也服溫補熱藥太過壅塞經絡難於一時奏效惟以豁痰清火通行經絡之藥煎丸並進庶可漸次見功一切醇酒厚味難化之物並宜暫戒煎方蒼朮廣皮厚朴半夏香附旋覆木通黃柏牛膝木瓜加姜砂仁丸方蒼朮黃柏牛膝厚朴廣皮香附木瓜枳殼砂仁生薑木通煎湯法丸林兄因飲酒而傷胃酒性大熱擾其血分而吐血加之抑鬱不舒胸膈不寬氣上衝逆而咳濁痰脈息沉弦帶數兩關尤甚此係氣滯血凝於胃上升而來也治宜消痰降火理氣之藥為主桃仁丹參鬱金栝蔞枳殼山梔牛膝香附蘇子黃芩杏仁加茅根受病之源得之惱怒鬱結以致肝火升騰上干肺金而咳嗽肝為藏血之臟因咳極致血血隨火升之故熱極覺有腥穢之氣而肺金痿之病自春至秋金得令肝木受傷吐血復作連日氣逆於上胸膈不舒治血必先理氣氣降則血自歸經俟胸膈寬暢之後再議滋陰此先後緩急之法也脈息左手帶弦此肝火妄動也右手滑大關部尤甚此胃中痰瘀糾結之象也理宜豁痰降氣消瘀之藥先疏其胸膈之滯然後以清肺滋陰之藥仍兼消痰以治其本庶可漸奏效蘇子杏仁鬱金丹皮栝蔞桃仁枳殼川貝廣皮黃芩山梔加茅根胸膈寬舒氣平後服方生地白芍丹皮麥冬川貝蔞霜黃芩廣皮茯苓沙參加茅根膏方生地丹皮麥冬地骨川貝蔞仁白芍天冬梨汁藕汁茅根汁渭兄受病之源得之平素多思多郁思則氣結肝氣鬱於脾土之中不得疏泄下注肛門而發痔肝為藏血之臟血得熱而妄行鬱火妄動擾其血分而下注去血之後面色自然㿠白肝主疏泄肝火擾其精房則夢遺脈息沉弦帶數夜臥則口乾煩躁此鬱火薰蒸也語言響亮而不怯弱飲食有味多則作脹此肝氣鬱於脾土之中不得疏泄之故也種種諸端皆屬肝氣抑鬱時當冬令潛藏之月正木火藏伏於內不得泄越而致病理宜加味溫膽湯為治半夏廣皮棗仁黃柏香附枳殼山梔青皮鉤藤甘草加姜沈益友夫人受病之源得之懷妊胎氣壅滯加之夏令暑熱之邪蘊蓄於內發為痢疾至九月終分娩之後腹中空曠內伏之火乘機外達上干肺金而咳嗽氣急肺受火爍不能清肅下行致小便不利而腫嘈雜嘔吐痰涎內經所謂諸逆衝上皆屬於火又云諸嘔痰喘皆屬於上上者上焦肺胃也因肺胃薰灼之故其氣逆上而不得臥小便熱而作痛大便後重逼迫脈息弦數種種諸端皆由暑熱之邪伏藏於內而致理宜和胃豁痰降火降氣之藥為治半夏廣皮蘇子杏仁桑皮石羔黃芩山梔枳殼麥冬煎膏方半夏廣皮蔞仁蘇子杏仁石羔梨汁萊菔汁麥冬黃芩生薑千墩馬九成得痿症每有所觸即臥床不起痿軟無力飲食如常亦無寒熱夜不得臥神魂不寧綿延幾月漸次步履而安去冬火氣潛藏之時其病復發究其受病之源得之飢飽不時胃氣受傷脾不能運津液為火煅煉成痰上干心竅則神不寧而不得臥頭眩耳鳴脈息左手微弦右手獨見滑大有力此係胃中有郁痰鬱火稍有所觸即竊發經云胃不和臥不安陽明之熱薰蒸肺金則痿而無力又云諸痿皆屬於肺熱故治痿獨取陽明當以和胃豁痰之藥為治唐冊垂濕熱痢醫家唐若如用歸脾湯加苡仁扁豆乾薑丸方用白朮茯神棗仁黃耆破故紙等藥不愈延余診視予曰大凡治病先以議其受病之源而用藥庶幾合式如冊垂兄之病因平素嗜酒則知腸胃間濕熱蘊蓄不清者久矣加之夏令外受暑熱之邪內伏之濕熱乘機而發為痢綿延連歲每至秋冬起病之期必然復作仲景云下痢至其時復發者此下未盡復下之因脾主信故也前者又有黃疸之病則知濕熱為患無疑目下發而難愈腹中作痛後重逼迫所下者皆赤白面色痿黃兩足浮腫倦怠乏力小便短少脈息洪大有力此濕熱之邪未清也理宜清濕熱利小便理滯氣為治乃為對症之藥今閱前方參耆朮補氣則濕熱之邪何從出路用棗仁遠志似乎養肝安神而並無此症既用扁豆苡仁實脾又用當歸潤腸自相悖謬如此赤水下迫而用乾薑助火至於九月終又用破故紙補腎火肉豆蔻暖脾止瀉又加當歸潤腸之品不知何故況痢與泄瀉兩症大不相同竟將混為一途大非前腎之法乃張景岳混同立論之談也駿老平素畏寒惡風此內有鬱火也鬱火發越則又畏熱胸膈阻滯不通大便燥結食物入胃至晚作酸而嘔脈息沉弦而數兩關尤甚此係肝火鬱於胃中煅煉津液成痰而作酸隨肝火上衝而嘔吐並有白沫而冷者乃熱極似冷非真寒也是乃噎膈反胃之基經云三陽結謂之膈三陽者大小腸膀胱也結熱結也熱結於下則反之於上治之法先宜和胃豁痰開鬱之藥理其中焦然後以養陰之品潤其大腸庶得奏效也煎方半夏廣皮香附山梔旋覆花栝蔞鬱金枳殼茯苓丸方半夏廣皮枳殼山梔蔞仁川連萊菔子香附膏方生地當歸白芍蘇子杏仁蔞仁柏子仁梨汁茅根汁茂兄平素嗜酒多怒此胃中有濕痰濕火肝氣鬱而不舒濕火上蒸則多汗怒傷肝肝血為之上升而見紅脈息左手弦大此肝火妄動也右手滑大有力此胃中有濕痰濕火也下流於大腸則為痔瘡理宜豁痰清火之藥治之煎方半夏廣皮石羔山梔青皮蘇子枳殼黃芩丹參黃柏丸方半夏廣皮蔞仁香附山梔青皮蘇子枳殼黃芩丹參黃柏胃中有郁痰隨火上升閉其心竅則神昏而咽喉塞礙脈息弦滑帶數此係肝火薰灼津液口乾舌燥上蒸而為汗乃類中之基也理宜清火豁痰之藥為治半夏廣皮石羔黃連山梔天麻栝蔞鉤藤菖蒲枳殼甘草德言兄天稟腎水不足不能榮養肝木肝火妄動血隨火升而見紅見紅之後未免憂思抑鬱胃中津液煅煉成痰糾結於中飲食少進胸次不舒痰隨氣逆而咳嗽脈息兩關沉滑帶弦此肝氣鬱於胃中不得條達之故今值君火司天之年又際春夏之交正炎炎之勢日熾慮其肺受火灼而咳嗽更甚惟以涼血清火開鬱之藥為善後之計但治血必先理氣氣降則血自歸經而不升痰亦隨氣而下降肺主氣臥則肺葉布散則氣為之上升非腎虛而氣不歸元也煎方蘇子杏仁生地丹皮川貝山梔鬱金枳殼蔞仁黃芩廣皮加茅根膏方丹皮川貝栝蔞麥冬杏仁橘紅梨汁枇杷葉茅根丸方香附山梔鬱金栝蔞黃芩廣皮丹皮枳殼茅根娘娘受病之源緣腎水不足不能榮養肝木肝火升騰頸間結核累累甚多肝火上衝則嘔吐用八味丸服之相妥者因胃中痰火得熱藥開通隧道同氣相求似乎相安然積之已久助火消陰交君火司天之年積熱竊發火氣上炎汗出發熱痰中帶紅寒熱如瘧經事不來脈息弦大帶數此係水衰火亢肺金受傷之象理宜滋陰清肺豁痰降火之藥治之士老向有痰火鬱於胃中上升則眩暈不得疏泄則嘈雜似飢上爍肺金則痿軟乏力散於四肢則手足心煩熱脈息沉數帶滑右關尤甚此係胃中郁痰鬱火所以結成有形之物理宜豁痰清火理氣之藥為治半夏廣皮天麻鉤藤枳殼川連夏枯草石羔麥冬山梔海鹽朱龍為於五十六年十月瘧疾四五發即止此時精神未復仍勞碌倍常並忍氣不發五十七年春夜膳後胃中覺飽脹一更時候飲食吐盡方臥自此以後或五日或十日一吐夜膳少進甚至絕悶不敢夜膳是時服資生丸五十八年春清晨服大八味下午服香燥藥醫家云肝氣欠和胃中甚寒將來恐有疝氣故服之至初夏胃中痛漸甚每日申酉之分飽脹疝氣兼有盤腸氣痛至戌時分必將夜膳吐盡至五更時倦睡方寧秋間二日一發三日一發夜膳不用至冬亦然五十九年疝氣盤腸氣痛稍痊至夏全愈至於胃脘痛嘔吐或半月一發或一月一發六十年嘔吐胃痛一歲必遇四五次六十一年元氣亦然二年分全愈是歲十一月感冒風寒飲食不進腰背俱痛此時便不服大八味十二月二十日忽起黃疸遍身發癢小便短赤屢服藥至三年分八月全愈但黃疸時嘔吐不發黃疸愈此症又發目下減餐茹素日中啜粥方好若遇膏粱厚味則胃痛嘔吐背痛腰痠盜汗發癢種種不適並易動氣口苦必吐盡方安又若稍受風或用心身便寒熱精神更疲倦矣案龍為兄受病得之外傷暑邪內傷食物停滯胃中煅煉津液成痰至冬令為外邪所觸而發瘧四五發即止者冬令潛藏故也至來春其餘邪留滯加之鬱怒傷肝交春令發陳之月肝木用事木性善脹食後胃中脹滿不得下達肝火上衝而嘔吐其時即應疏達肝火兼扶脾胃則吐可愈乃服資生丸內中參朮山藥蓮肉扁豆芡實等藥皆閉氣凝滯之品其肝氣不得下達而至病之不愈也又服八味丸香燥等藥肝火愈熾大凡疝症系內有肝火外受寒涼抑遏而成反用八味助火甚悖謬內有地黃乃凝滯之藥故胃中壅塞不通而痛陽明旺於申金故脹滿而痛更甚肝氣上逆沖胃胃中之食物吐盡交五更陽氣肺金主事金旺則木平故能安睡此皆肝氣鬱於胃中不得通泰而致病也交春令木旺生髮之時肝氣得以疏泄至夏令木性垂枝布葉盡發於外所以疝氣全愈然其餘波尚未盡除故有時胃痛嘔吐是歲十一月正一陽初動之時胃中所伏之火外為風寒所觸飲食不進其火流注腰背不能外達而作痛冬至遏郁不舒鬱蒸而為黃疸胃主肌肉濕熱薰蒸則發癢小便短赤黃疸時其濕熱得發於外故胃痛嘔吐不發黃疸愈則濕熱之邪復留於內所以胃痛嘔吐復作若遇膏粱厚味壅滯胃中則蒸而為汗發於肌表而作瘙癢種種諸端皆屬胃濕熱痰飲糾結不清肝火鬱而為病所以脈息左手沉弦右手滑大有力治法先講薄滋味戒惱怒避風寒並服豁痰清肝理氣之藥自然卻去病蒂矣煎方半夏廣皮山梔香附川連厚朴青皮葛根木通柴胡丸方半夏廣皮山梔香附川連萊菔子連翹厚朴青皮枳殼夏枯草煎湯法丸以兄右半唇與髮際牽引作痛至春則發秋冬則愈已經三載診其受病之源乃少陽之火鬱於胃中不得疏泄至春發陳之月內伏之邪應時而外達秋冬則為之斂藏故也脈息沉弦帶數乙木鬱於坤土無疑矣治宜疏肝火使其外達自然平安也煎方柴胡山梔香附枳殼石羔連翹黃芩鉤藤木通夏枯草丸方柴胡山梔連翹香附黃芩枳殼石羔栝蔞廣皮甘草夏枯草湯法胃中痰火薰蒸而發為之脫落理宜豁痰清火為治煎方半夏廣皮栝蔞石羔生地黃芩山梔夏枯草花粉麥冬丸方生地麥冬丹皮黃芩山梔黃柏石羔花粉知母天冬連翹蜜丸南兄少年時多飲火酒酒性大熱有毒積於胃中下流而發毒膿潰之後餘毒未消補之太早熱邪流注於膀胱而小便為之淋漓作痛結為沙石屢次竊發今交君火司天之年其發頻而尤甚小腹脹滿不舒脈息弦數此係肝火鬱於膀胱煅煉津液而成黏膩之物瘀塞溺道而淋漓作痛也理宜清肝火理滯氣之藥為治急戒醇酒厚味惱怒則胸中清爽而小便自利矣煎方香附山梔黃柏青皮枳殼滑石栝蔞生地牛膝鬱金木通加砂仁燈草丸方香附黃柏桃仁青皮山梔滑栝蔞枳殼牛膝鬱金平素多思多郁郁久成火得風則熾而發寒熱交春發陳之月內郁之火因時竊發無從疏泄則皮膚之間流走作痛鬱於內則胸膈脹滿而口乾氣急飲食不得下達鬱火煅煉津液大能榮養大腸則大便為之燥結五六日解一次脈息沉弦帶數此乃鬱火煅煉津液成痰阻滯胃中所以不飢不食理宜先通大便則上焦之鬱火從此下降並以理氣清火之藥使其經絡宣暢所謂通則不通也煎方香附山梔廣皮半夏栝蔞木通萊菔子枳殼滑石黃柏石羔生薑丸方香附山梔廣皮黃柏栝蔞枳殼萊菔子石羔滑石木通桑枝湯法經云頭痛耳鳴九竅不利腸胃之所生也頭為諸陽之會六經皆會於頭胃中濕火上升則頭作痛其瘡亦是濕熱為病理宜豁痰清火為治廣皮半夏山梔黃芩連翹石羔黃柏枳殼木通加生薑策兄有胃脘作痛之病緣醇酒厚味積於胃中擾其血分停滯不通值今君火司天之年血隨火升而吐其色黏膩而紅者此瘀血也脈息右手弦數左手沉滑此乃肝火妄動胃中之痰與瘀血互相糾結上干肺家而咳嗽胸膈不舒飲食減少暫用滾痰丸二錢鬱金湯送下以逐胃中之痰瘀從大便而出然後以消瘀豁痰清火順氣之藥去其餘波則胸次寬舒不致上升而咳嗽吐血矣蘇子桃仁鬱金山梔枳殼黃芩栝蔞香附川貝廣皮丹參牛膝加茅根聖翁天稟素弱暑熱之邪乘虛襲入而發瘧瘧止之後暑邪未盡下流於兩足而作痛服八味丸補中益氣丸若果系虛症服之宜氣體健旺何至愈加疲憊而作痛則知邪氣未盡而誤補之故也瘧之發亦因胃中有痰暑熱之邪互相結成而起因服補藥胃中之痰郁遏不清積之已久至春令發陳之月內伏之火竊發上升則齒痛因陽明胃脈環唇口入齒伏火由其經而泄胃為貯痰之器津液為火煅煉成痰至清晨陽氣升騰痰隨火升所以語言不能大凡痰病得熱藥開通隧道似乎相安旋即熱勢愈盛真陰愈耗反令內火薰灼所以畏熱熱極消爍下注而小便為之多火升則齒痛火降則痛止積熱之久消爍津液而為三消之症久之實為鼓脹或發癰疽則為不治之症目下胃中之火炎於上則齒痛耳癢脈息沉澀此痰火鬱結於胃不得宣通之故理宜豁痰清火之藥為治陸占賢令媳平素肝家有鬱火肝主疏泄為藏血之臟肝火擾其血分血得熱而妄動故易於墮胎所以小腹攻衝不定小腹者肝之部分也膽為肝之表肝病而及於腑則上升於頭而為頭痛因少陽之脈起於目銳眥而抵頭角也痛則昏沉而不清因胃中之痰隨少陽之火而上升故飲食少進而無味肝為風木之臟肝火消爍則肌肉為之消瘦即內經所謂風消也每至午後火升者蓋腎肝為陰臟腎肝之陰不能榮養故至陰分而少陽之火上升而頭痛也種種諸疾皆由肝膽之火鬱而不舒理宜暫用疏肝清火開鬱之藥俟發熱頭痛已愈氣不攻衝然後再商調補之策柴胡山梔香附青皮半夏廣皮黃柏黃芩夏枯草蘆店陳子明受病之源因露臥傷濕風寒外來不得疏泄逆上而為喘急不得臥之病經云形寒飲冷則傷肺又秋傷於濕冬生咳嗽濕勝則腫所以先腫而後咳嗽也此脾病而及於肺理宜燥濕清肺降氣之藥為治並非肺脹也半夏廣皮萊菔子蘇子杏仁枳殼桑葉旋覆花蒼朮厚朴桂枝加生薑砂仁丸方二陳茯苓蘇子杏仁厚朴枳殼桑皮蒼朮萊菔子季先之病得之飢飽勞役有傷胃絡以致瘀血凝滯胃中結成有形之象按之而痛痰中所帶黏膩不鮮明之血食物阻滯難以下達鬱而不舒則作酸嘈雜大便艱澀小便黃赤脈息沉弦帶數此係瘀血糾結於胃理宜消瘀行滯之藥逐其瘀血從大便而出自然奏效桃仁歸尾香附滑石延胡青皮枳殼大黃鬱金陳源遠夫人遙擬大凡性急者有肝火經事後期不調此肝氣之滯故經事來遲也肝火鬱於胃中煅煉津液成痰下注而為白帶右邊偏頭痛者此胃中之痰隨肝火上而作痛俗名頭風並非風也得風則胃中之痰火竊發而痛脊之囟閂髮際脫落者因胃中痰火上熏而禿也大便患痔常艱澀胸前胃脘時時氣痛因胃中鬱而不舒郁久成火下流於大腸而為痔胃脘氣滯不宣通則作痛每晚浴後面紅唇燥者動則火升於上也動作辛苦勞傷元氣則腿腳痠軟五胎俱不育者因懷妊內熱耗其精血不能榮養之故也肝火衝於胃而嘔吐名曰惡阻過春令木氣謝事則不吐矣此症只宜疏肝扶脾一切凝滯之藥俱不宜服壅滯則肝氣不能疏泄脾氣愈困矣目下以安胎為第一著安胎之法惟健脾清火理氣為要藥凝滯則胎氣不能轉運恐生產難氣道流行則胎氣轉輸而易產丹溪云胎前毋滯產後毋虛今酌於後條芩白朮香附廣皮山梔枳殼蘇梗杜仲續斷荷蒂砂仁為引嘉興杜景山景老胃中有痰肝家有火下注精房而為夢遺誤用溫補澀精之藥痰火壅塞下行薰灼血分而為便血血虛不能榮潤大腸則大便燥痰火上升於頭則眉發為之脫落肝火下注則小便頻數種種諸端皆屬痰火鬱於胃中誤用補澀之藥無從發泄而諸症蜂起時交相火司天之年夏令炎熱之月所以脈息左手弦大右手滑大理宜暫用豁痰清火之藥以治其鬱結俟爽之後再以滋陰藥為善後計煎方半夏廣皮栝蔞山梔黃柏石羔黃芩連翹滑石枳殼甘草丸方二陳加黃柏黃芩連翹蔞仁花粉生地石羔枳殼胃中食積與肝火鬱滯不通而為脹滿肝火薰蒸於上則兩目昏暗脈息弦數不靜此係肝火鬱於脾土之中濕痰食積互相為患也理宜清濕消道之藥治之蒼朮厚朴香附萊菔子廣皮石羔滑石青皮黃柏山梔砂仁久瘧之後胃中頑痰未清鬱而為火上炎於面而紅下注手足而腫閉其經絡而麻脈息兩關滑大此係郁痰鬱火為患宜以豁痰清火為治先服滾痰丸二錢煎方二陳枳殼石羔栝蔞黃芩萊菔子旋覆花天麻加生薑竹茹九方二陳加茯苓枳殼黃芩石羔栝蔞萊菔子山梔香附生薑鉤藤湯法瘧疾而兼咳嗽吐血脈息細數而側眠此勞瘧也理宜滋陰保肺之藥治之胃中有膠痰肝家有鬱火肝主疏泄其火上升則頭角多汗肺胃居右其火旁流則兩手亦多汗胃為貯痰之器得肝火煎熬津液成痰膠固難出得火之上升其痰隨之而出自覺畏冷此熱極似寒非真寒也肺主皮毛主宰一身之氣而外衛皮毛稍有不足其邪易於侵襲痰氣流於四肢則手指麻痹肝氣下流於陰囊無從疏泄則腎子脹痛上升則有頭暈目眩耳鳴等症診得脈息左手弦大不靜此肝火之妄動也右手滑大有力關部尤甚此胃中有膠痰肺氣壅滯不行故胸膈不寬而脹悶得氣展舒運化則覺舒適種種見症皆屬痰氣凝結肝火鬱而不得條達通暢之故也先宜豁痰理氣降火之藥使氣行而不滯火降而不升庶不致猝然顛仆而成類中也又恐其痰氣留結而為噎膈反胃之症故不得不防微杜漸而預為籌畫也煎方二陳山梔黃連枳殼香附青皮天麻鉤藤甘草丸方二陳茯苓青皮香附山梔黃連栝蔞萊菔子天麻砂仁生薑鉤藤湯法又培本丸六君子湯加黃連香附天麻鉤藤湯法附錄護養法巢氏曰小兒初生肌膚未實宜用舊絮護其背不可太暖更宜數見風日則血氣剛強肌肉緻密若藏於重幃密室或衣厚暖則筋骨軟脆不任風寒多易致病衣服常隨涼熱加減但令背暖為佳亦勿令出汗表虛風邪易致乳哺不宜過飽若宿滯不化消乳丸治之陳氏所謂忍三分寒吃七分飽頻按肚少洗浴要肚暖頭涼心胸涼此至論也須令乳母預順七情六慾厚味炙爆則乳汁清寧兒不致病否則陰陽偏勝血氣沸騰乳汁敗壞必生疾病若屢用藥餌則臟腑陰損多實敗症可不慎歟大抵保嬰之法未病則調治乳母既病則審治嬰兒亦必兼治其母為善小兒哺乳宜慎擇論夫初生小兒藉乳為命其乳哺之法不可不慎蓋乳者榮血之所化也故乳母尤宜謹節飲食下咽乳汁便通情欲乳汁便應病氣則乳汁必凝滯兒得此疾病立至不吐則瀉不瘡則癤或為口糜或為驚搐或為夜啼或為腹痛病之初來其溺必甚少便須詢問端的隨症調治母安則子安可消患於未形也故乳母夏不欲熱熱則致吐逆冬不欲寒寒則咳嗽母不欲怒怒則上氣顛狂母不欲醉醉則令身熱腹痛母方吐下而乳則致虛羸母有積熱而乳則致變黃不能食新房而乳則瘦脊交頸不能行新浴而乳則發吐呃神困傷熱乳則瀉黃傷冷乳則瀉青冷熱不調停積胸膈結為痰飲遂成壯熱不已乃成驚癇兒啼未定遽以乳哺之氣逆不消因成乳癖懷妊而乳致令黃瘦腹大腳弱名曰魃病大抵乳哺不可太飽故俗云若要小兒安須帶三分飢與寒是也海上老人沈璠撰沈魯珍批景岳全書後天下惟中正無偏之理守之不失則其立言也無弊而垂諸世也可久苟不得其中而執乎一隅之見漫焉有所著述以驚愚而動眾雖或博一時之譽終未可以信今而傳後也善學古人者不為古人所愚況今人乎會稽張會卿以醫名於時著有景岳全書若干卷學者宗之無異議矣海上沈子魯珍謂此書獨以先天水火陰陽命門真言立異而其治病也一以扶陽溫補為主且以河間丹溪之言為後學之害是執乎一隅之見而不可以為訓且恐宗其說之入於岐趨也於是摘其紕繆揭其舛錯者一句一字旁批而辨駁之考證詳確無義不精司馬子長有云非好學深思心知其意難為淺見寡聞者道也夫人之有疾死生存亡之所繫也古之善治疾者必推越人淳于諸賢謂其遇症用藥可清可溫可寒可熱可攻可補神明變通而不膠於一定者也若依景岳之說惟講扶陽而用熱藥補塞則其為功也暫而其為禍也甚烈學周孔之學者之乎其偏則其為害也止於一己學軒岐之學者而之乎其偏則其貽害也且將及於天下後世而系人之死生存亡可不懼哉魯珍之有是評非矯為異也要歸之中而已豈得附和其說而謂景岳之所愚哉魯珍出是書以示予閱畢念其一生精力之所寄也作此以贈之松江府尊張文英撰沈魯珍評醫宗必讀論瘧疾久瘧必虛一句最能誤事如果虛而有寒痰者服之相宜如瘧久而有痰積於胃又有陰虛而火盛者服之必不宜士材議近世之醫皆不明理惟我獨尊此言過也松江東門外有趙嘉樹者其人少年多欲患瘧經久醇酒厚味不禁求其速愈請何士宗調治用生薑一兩人參一兩煎服可愈彼如其言始覺爽快一時後覺大熱即下為血痢腹痛後重晝夜三四十次延余治之至已告殂矣此乃誤補之故記之以告同志者士材以陽為君子陰為小人熱藥為君子寒藥為小人但易云一陰一陽之謂道內經云無陽則陰無以生無陰則陽無以化二者不可偏廢至於治症當以元氣為君子邪氣為小人元氣宜補邪氣宜去寒熱溫涼隨病而施中病而止豈可多事溫補痛戒寒涼乎內經病機十九條屬火者五屬熱者四屬寒者一則知屬火熱者多屬寒者少用藥治病宜體內經之意不宜專執己見談天說地以惑後人七十七老人沈璠謹議俟後之君子裁酌是否王協忠先生癍疹論少陰所至為瘍疹少陽所至為瘡疹少陰者君火也君火為當令之火或上下左右間主步之火亦為當令故諸痛癢瘡瘍皆屬之少陽者相火也相火為不當令之火遊行於木土金水之時不期而至即四時非節之暖也少陽與厥陰為合肝與膽其潛使之鄉胞絡之焦其遊行之地其勢一至則胞絡之間膻中之位不啻積薪厝火其人必鬱鬱不樂寒不甚而熱不甚口乾煩冤目淚顴紅或四肢微厥其熱上薰於肺肺主皮毛故發紅點是為赤疹赤疹必無汗而毛燥若有汗者熱勢已達其點淡紅而稍大若重感於邪者於表症中兼見前證亦必俟其透達而後得解故初時禁用苦寒恐其冰伏耳世人皆知癍疹初起忌用寒涼殊不知忌用涼藥者疹證而非癍症也治少陽疹症始終不可離涼膈之劑亦不可加引經藥果見兼症悉照下論加入於本方非若治他症表下和為各別也其症非比癍症同看甚至連六七次者後發白色者方止其主潔古消風散即涼膈去硝黃取甘桔荊翹芩梔薄荷赤芍木通直達膈間消風散熱毒氣自然解散已出之後再加大力殭蠶元參之類以化其蘊蓄之毒兼表者合香蘇芎蘇之類勢甚者十神湯然隆冬初春庶幾相宜春夏秋三時在所禁用因麻黃為寒傷榮者之專司而葛根升麻雖輕揚解表實陽明經藥但可借用非本症藥也火勢甚於內目赤唇焦口乾譫語本方加黃連熱甚於表口渴而脈大汗出者本方合白虎往來寒熱脈弦不解者本方合小柴胡府實內結者本方硝黃以潤下之餘熱不退本方加生地丹皮之類以養其陰此用藥之概也至若歷來方書皆云癍出於陽明疹屬於太陰癍主於火疹主於濕濕之一字大謬不然夏月暑熱合邪而發疹者或有之脾經濕熱兼發水疹久之為疥瘡者或有之此外無疹症之理蓋皆誤認膈熱薰肺之手太陰症為足太陰症耳膈熱薰肺四字為疹症之準繩發前人所未發其辨點之法方書皆云癍無頭粒殊不知癍無頭粒反濕於皮膚之上歷歷可數其重者如雲如錦而於雲錦之中必有點如硃筆點就者疹有頭粒反若隱若現辨之不甚分明隨出隨沒癍本於胃熱見點便忌升提急急化癍尚慮胃爛疹則先出者已化後至者尚多惟有始終清解而已故凡大青犀角石羔黃連癍症藥也升麻葛根為失表為癍之表藥也承氣湯治失下成癍之裡藥也人參白虎湯體虛發癍者之對症藥也總之四時六氣感之皆為外感皆能兼見癍疹一見癍疹便不復傳經轉屬蓋陽明土也藥物歸之無所復傳邪形似水望其低下處而就之膈間既熱無邪不入無入不成溫熱之邪一發為疹疹為病本矣但發疹之症冬溫與春溫之症最多不知何故意者冬時寒為正令溫暖之令反為異氣豈即所謂少陽所致耶冬傷於寒寒毒藏於肌膚者每多連膈耶近老月令廣言冬時醇酒厚味向火圍爐過於溫熱者多病於春多發麻疹真先得我心矣又癍疹決非陰症決無熱補之理方書雖有陰症發癍一條然必症陰脈陰內真寒而外假熱癍色淡而面戴陽善於臨症者自能辨之但治其病而癍自愈矣又有內傷發癍一症亦必勤勞之輩體虛之人而又過食冷物迫陽氣浮於肌表而發淡紅點內傷外感判然不同細考東垣法自能辨之前輩尚有極癍之說病至既危身有幾點赤癍與癍無異氣血澆漓所致非癍症也小兒瘧痢臨危極多予見之數矣
